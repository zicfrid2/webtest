<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: #0f1115;
            color: #fff;
            font-family: Arial, sans-serif;

            display: flex;
            justify-content: center;
            background: #0f1115;
        }

        .app {
            width: 100%;
            max-width: 430px;
            min-height: 100dvh;

        .title {
            margin: 8px 0 16px;
            text-align: center;
            font-size: 22px;

        }

            width: 100%;

            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.28);

        }

        button {
            flex: 1;
            border: none;
            border-radius: 14px;
            padding: 14px 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-back {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .btn-refresh {
            background: #4da3ff;
            color: #fff;
        }

        .status {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.85);
        }

        canvas.hiddenCanvas {
            display: none;
        }

        pre {
            margin-top: 12px;
            max-height: 300px;
            overflow: auto;
            background: rgba(0,0,0,0.28);
            padding: 12px;
            border-radius: 12px;
            color: #d8e6ff;
            font-size: 12px;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="title">표정 분석 이미지</div>

        <div class="preview-wrap">
            <canvas id="displayCanvas" class="preview-canvas"></canvas>
        </div>

        <div class="info-card">
            <div class="info-title">이미지 정보</div>
            <div class="info-text" id="imageInfo">불러오는 중...</div>
        </div>

        <div class="info-card">
            <div class="info-title">검출 결과</div>
            <div class="info-text" id="detectInfo">분석 대기 중...</div>
        </div>

        <div class="info-card">
            <div class="info-title">디버그 로그</div>
            <pre id="debugLog">대기 중...</pre>
        </div>

        <div class="button-row">
            <button class="btn-back" id="backBtn">뒤로가기</button>
            <button class="btn-refresh" id="reloadBtn">다시 불러오기</button>
        </div>

        <div class="status" id="statusText">이미지를 불러오는 중...</div>

        <canvas id="hiddenCanvas" class="hiddenCanvas"></canvas>
    </div>

    <script>
        const DB_NAME = 'faceCaptureDB';
        const STORE_NAME = 'images';
        const IMAGE_KEY = 'latestCapture';

        const imageInfo = document.getElementById('imageInfo');
        const detectInfo = document.getElementById('detectInfo');
        const debugLogEl = document.getElementById('debugLog');
        const statusText = document.getElementById('statusText');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const displayCanvas = document.getElementById('displayCanvas');
        const displayCtx = displayCanvas.getContext('2d', { willReadFrequently: true });

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);

                req.onupgradeneeded = function (e) {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };

                req.onsuccess = function () {
                    resolve(req.result);
                };

                req.onerror = function () {
                    reject(req.error || new Error('IndexedDB open failed'));
                };
            });
        }

        async function loadBlobFromDB() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(IMAGE_KEY);

                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => reject(req.error || new Error('Blob load failed'));
            });
        }

        function loadImageFromBlob(blob) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(blob);
                const img = new Image();
                img.onload = () => resolve({ img, url });
                img.onerror = reject;
                img.src = url;
            });
        }

        function make2DArray(rows, cols, fill = 0) {
            const arr = new Array(rows);
            for (let i = 0; i < rows; i++) {
                arr[i] = new Array(cols).fill(fill);
            }
            return arr;
        }

        function make3DArray(a, b, c, fill = 0) {
            const arr = new Array(a);
            for (let i = 0; i < a; i++) {
                arr[i] = new Array(b);
                for (let j = 0; j < b; j++) {
                    arr[i][j] = new Array(c).fill(fill);
                }
            }
            return arr;
        }

        class Coord {
            constructor(x = 0, y = 0) {
                this.X = x;
                this.Y = y;
            }
        }

        class FaceBean {
            constructor(imageData, width, height) {
                this.imageData = imageData;
                this.width = width;
                this.height = height;
                this.errCode = '';
                this.eye_r = Array.from({ length: 10 }, () => new Coord());
                this.eye_l = Array.from({ length: 10 }, () => new Coord());
                this.centerX = 0;
                this.centerY = 0;
                this.eyeRL = 0;
            }
            getTex() { return this; }
            setTex(tex) { this.imageData = tex.imageData; this.width = tex.width; this.height = tex.height; }
            setErrCode(v) { this.errCode = v; }
            getErrCode() { return this.errCode; }
            setEye_r(v) { this.eye_r = v; }
            getEye_r() { return this.eye_r; }
            setEye_l(v) { this.eye_l = v; }
            getEye_l() { return this.eye_l; }
            setCenterX(v) { this.centerX = v; }
            getCenterX() { return this.centerX; }
            setCenterY(v) { this.centerY = v; }
            getCenterY() { return this.centerY; }
            setEyeRL(v) { this.eyeRL = v; }
            getEyeRL() { return this.eyeRL; }
        }

        class CommonClass {
            RGB255toHSV_100(r, g, b) {
                r /= 255; g /= 255; b /= 255;
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                const d = max - min;
                let h = 0;
                const s = max === 0 ? 0 : d / max;
                const v = max;

                if (d !== 0) {
                    switch (max) {
                        case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
                        case g: h = ((b - r) / d + 2); break;
                        case b: h = ((r - g) / d + 4); break;
                    }
                    h /= 6;
                }
                return {
                    hue: h * 100,
                    sat: s * 100,
                    bri: v * 100
                };
            }
        }

        class DetectEyesJS {
            constructor(logger) {
                this.width = 0;
                this.height = 0;
                this.pixels = null;
                this.logger = logger || (() => { });
            }

            log(...args) {
                this.logger(args.join(' '));
            }

            DetectMain(bean) {
                bean = this.DetectProcess(bean, 1220, 1600, -1500, -1270, 1);
                bean = this.DetectProcess(bean, -1060, -660, -1500, -1270, 2);
                return bean;
            }

            DetectProcess(bean, h_start, h_end, v_start, v_end, rl_code) {
                const tex = bean.getTex();
                this.pixels = tex.imageData.data;
                this.width = tex.width;
                this.height = tex.height;

                let i = 0, j = 0, k = 0;
                const InclineAndPeak = make2DArray(100, 12, 0);
                const InclineAndPeak2 = make3DArray(100, 6, 11, 0);

                this.log("height:" + this.height + ", width:" + this.width);

                const cc = new CommonClass();

                let g_sum = 0;
                let b_sum = 0;
                let r_sum = 0;
                let r = 0, g = 0, b = 0;
                let cnt = 0;
                let color_all = 0;
                let line_cnt = 0;
                let adjust_cnt = 0;

                let ii, jj;
                const lineInfo = make2DArray(400, 7, 0);

                let pivot_inc = 0;
                let pivot_black = 0;
                let pivot_black_boundary = 0;
                let pivot_white = 0;
                let pivot_gap_bw = 0;
                let adjust_line = 7;

                const inclineInfo = make2DArray(200, 9, 0);
                const inclineInfo2 = make2DArray(200, 9, 0);
                let inclineInfoCnt = 0;
                let inc_start = 0, cur = 0, inc_end = 0, incCnt = 0, is_continue_inc = 0, pointJ = 0, inverseCnt = 0, avgInclineV = 0, totInclineV = 0;
                let inclineV = 0, inclineVCur = 0;
                let tot_fail_cnt = 0;

                const pivot_inc_axis = 0.025;
                let init_k = 1250;
                let start_k = init_k;

                let k_abs = 0, i_abs = 0;
                let hue = 0, sat = 0, bri = 0;
                let UpT = 6;
                let yUnity = 0;

                const colorR = [255, 0, 0, 255];
                const colorG = [0, 255, 0, 255];
                const colorB = [0, 0, 255, 255];
                const colorBLK = [0, 0, 0, 255];
                const colorY = [128, 255, 255, 255];

                line_cnt = 0;

                for (k = h_start; k < h_end; k += 4) {
                    cnt = 0;
                    k_abs = Math.abs(k);

                    for (i = v_start; i < v_end; i += 2) {
                        i_abs = Math.abs(i);
                        g_sum = 0;
                        b_sum = 0;
                        r_sum = 0;

                        for (j = k_abs; j < k_abs + 2; j++) {
                            ({ r, g, b } = this.GetRgbTopLeft(j, i_abs));
                            g_sum += g;
                            b_sum += b;
                            r_sum += r;

                            ({ r, g, b } = this.GetRgbTopLeft(j, i_abs - 1));
                            g_sum += g;
                            b_sum += b;
                            r_sum += r;
                        }

                        color_all = Math.floor(g_sum * 0.9);
                        const hsv = cc.RGB255toHSV_100(Math.floor(r_sum * 0.25), Math.floor(g_sum * 0.25), Math.floor(b_sum * 0.25));
                        hue = hsv.hue;
                        sat = hsv.sat;
                        bri = hsv.bri;

                        if (cnt === 0) {
                            pivot_inc = Math.floor(color_all * pivot_inc_axis);
                            pivot_black = Math.floor(color_all * 0.25);
                            pivot_black_boundary = Math.floor(color_all * 0.75);
                            pivot_white = Math.floor(color_all * 1.25);
                            pivot_gap_bw = Math.floor(color_all * 0.3);
                        }

                        lineInfo[cnt][0] = color_all;
                        lineInfo[cnt][1] = i_abs;
                        lineInfo[cnt][2] = k_abs;
                        lineInfo[cnt][3] = Math.floor(bri);

                        if (lineInfo[cnt][0] < pivot_black) lineInfo[cnt][0] = pivot_black;
                        if (lineInfo[cnt][0] > pivot_white) lineInfo[cnt][0] = pivot_white;

                        cnt++;
                    }

                    inclineInfoCnt = 0;

                    for (ii = 0; ii < cnt; ii++) {
                        inc_end = ii + 6;
                        incCnt = 0;
                        is_continue_inc = 0;
                        pointJ = 0;
                        inverseCnt = 0;
                        avgInclineV = 0;
                        totInclineV = 0;
                        cur = ii;

                        inclineInfo[inclineInfoCnt][0] = ii;
                        inclineInfo[inclineInfoCnt][2] = lineInfo[ii][0];
                        inclineInfo[inclineInfoCnt][5] = lineInfo[ii][1];
                        inclineInfo[inclineInfoCnt][6] = lineInfo[ii][2];

                        for (jj = ii + 1; jj < inc_end; jj++) {
                            if (jj >= cnt + 1) break;

                            inclineV = lineInfo[jj][0] - lineInfo[jj - 1][0];
                            totInclineV += inclineV;
                            avgInclineV = Math.trunc(totInclineV / (jj - ii));

                            if (avgInclineV !== 0) {
                                if (((avgInclineV > pivot_inc && inclineV > (pivot_inc * 0.5)) ||
                                    (avgInclineV > pivot_inc && inverseCnt === 1 && inclineV > (pivot_inc * 0.5))) ||
                                    ((avgInclineV < -pivot_inc && inclineV < -(pivot_inc * 0.5)) ||
                                        (avgInclineV < -pivot_inc && inverseCnt === 1 && inclineV < -(pivot_inc * 0.5)))) {

                                    inverseCnt = 0;
                                    if (inclineV < 0) is_continue_inc = -1;
                                    else is_continue_inc = 1;

                                    pointJ = jj;
                                    incCnt++;

                                    if (incCnt > 1) {
                                        inclineInfo[inclineInfoCnt][1] = jj;
                                        inclineInfo[inclineInfoCnt][3] = lineInfo[jj][0];
                                        inclineInfo[inclineInfoCnt][4] = avgInclineV;
                                        inclineInfo[inclineInfoCnt][7] = lineInfo[jj][1];
                                        inclineInfo[inclineInfoCnt][8] = lineInfo[jj][2];
                                        inc_end++;
                                    }
                                } else {
                                    if (jj - ii > 1) inverseCnt++;
                                }
                            } else {
                                break;
                            }

                            if (inverseCnt > 1) break;
                        }

                        if (incCnt > 1) {
                            this.log(
                                "start:" + inclineInfo[inclineInfoCnt][0] +
                                ", end:" + inclineInfo[inclineInfoCnt][1] +
                                ", start color:" + inclineInfo[inclineInfoCnt][2] +
                                ", end:" + inclineInfo[inclineInfoCnt][3] +
                                ", avg:" + inclineInfo[inclineInfoCnt][4] +
                                ", x:" + inclineInfo[inclineInfoCnt][6] +
                                ", y:" + inclineInfo[inclineInfoCnt][5]
                            );
                            ii = pointJ - 1;
                            inclineInfoCnt++;
                        }
                    }

                    let color_code = 0;
                    let min_c = 0;
                    let max_c = 0;
                    let min_i = 0;
                    let max_i = 0;
                    let pivot_bri = 0;
                    let up_down = -1;
                    let fail_cnt = 0;
                    let inclineInfoCnt2 = 0;
                    UpT = 50;
                    max_c = 0;
                    min_c = lineInfo[0][0];

                    for (ii = 1; ii < cnt; ii++) {
                        if (up_down === -1) {
                            if (lineInfo[ii][color_code] < max_c - UpT || lineInfo[ii][color_code] < min_c + UpT) {
                                if (lineInfo[ii][color_code] < min_c) {
                                    min_c = lineInfo[ii][color_code];
                                    min_i = ii;
                                }
                                fail_cnt = 0;
                                max_c = 0;
                                continue;
                            } else {
                                fail_cnt++;
                                if (lineInfo[ii][color_code] > max_c) {
                                    max_c = lineInfo[ii][color_code];
                                    max_i = ii;
                                }
                            }
                            if (fail_cnt > 2) {
                                inclineInfo2[inclineInfoCnt2][0] = min_i;
                                inclineInfo2[inclineInfoCnt2][2] = lineInfo[min_i][color_code];
                                inclineInfo2[inclineInfoCnt2][3] = -1;
                                inclineInfo2[inclineInfoCnt2][5] = lineInfo[min_i][1];
                                inclineInfo2[inclineInfoCnt2][6] = lineInfo[min_i][2];

                                this.log("min i:" + inclineInfo2[inclineInfoCnt2][0] + ", color:" + inclineInfo2[inclineInfoCnt2][2] + ", x:" + inclineInfo2[inclineInfoCnt2][6] + ", y:" + inclineInfo2[inclineInfoCnt2][5]);
                                inclineInfoCnt2++;

                                up_down = 1;
                                fail_cnt = 0;
                                min_c = 1000;
                            }
                        } else {
                            if (lineInfo[ii][color_code] > min_c + UpT || lineInfo[ii][color_code] > max_c - UpT) {
                                if (lineInfo[ii][color_code] > max_c) {
                                    max_c = lineInfo[ii][color_code];
                                    max_i = ii;
                                }
                                min_c = 1000;
                                fail_cnt = 0;
                                continue;
                            } else {
                                fail_cnt++;
                                if (lineInfo[ii][color_code] < min_c) {
                                    min_c = lineInfo[ii][color_code];
                                    min_i = ii;
                                }
                            }
                            if (fail_cnt > 2) {
                                up_down = -1;
                                max_c = 0;
                                fail_cnt = 0;
                            }
                        }
                    }

                    if (inclineInfoCnt2 > 0) {
                        for (j = 0; j < 4; j++) {
                            if (inclineInfo2[j][5] > 0) {
                                InclineAndPeak2[adjust_cnt][j][0] = inclineInfo2[j][0];
                                InclineAndPeak2[adjust_cnt][j][1] = inclineInfo2[j][5];
                                InclineAndPeak2[adjust_cnt][j][2] = inclineInfo2[j][6];
                            }
                        }
                    }

                    let darkIndex = -1, secondIndex = 0;
                    let minBWColor = 1000;
                    let secondMinBWColor = 1000;
                    let secondMinBWColorI = 0;
                    let maxBWColor = 0;
                    let maxBWi = -1;
                    let minBWi = -1;
                    let eyeBWi = -1;
                    let secondMinBWi = -1;
                    let thirdMinBWi = -1;
                    let minBlack = -1;
                    let firstBlack = -1;

                    for (ii = 0; ii < inclineInfoCnt; ii++) {
                        if (inclineInfo[ii][4] > 0) {
                            if (inclineInfo[ii][2] < minBWColor) {
                                minBWColor = inclineInfo[ii][2];
                                minBWi = ii;
                            } else if (minBWi > 0 && inclineInfo[ii][2] <= minBWColor) {
                                minBWColor = inclineInfo[ii][2];
                                if (secondMinBWi > 0) {
                                    if (thirdMinBWi > 0) secondMinBWi = thirdMinBWi;
                                    thirdMinBWi = ii;
                                } else {
                                    secondMinBWi = ii;
                                }
                                this.log("SECOND or Third :" + inclineInfo[ii][0]);
                            }

                            if (inclineInfo[ii][3] - inclineInfo[ii][2] > maxBWColor) {
                                maxBWColor = inclineInfo[ii][3] - inclineInfo[ii][2];
                                maxBWi = ii;
                            }
                            if (inclineInfo[ii][2] <= pivot_black) {
                                minBlack = ii;
                                if (firstBlack === -1) firstBlack = ii;
                            }
                        }
                    }

                    let startST = 0;
                    if (thirdMinBWi > 0) {
                        startST = thirdMinBWi;
                        eyeBWi = thirdMinBWi;
                    } else if (secondMinBWi > 0) {
                        startST = secondMinBWi;
                        eyeBWi = secondMinBWi;
                    } else {
                        startST = minBWi;
                        eyeBWi = minBWi;
                    }

                    for (ii = startST + 1; ii < inclineInfoCnt; ii++) {
                        if (inclineInfo[ii][2] < secondMinBWColor) {
                            secondMinBWColor = inclineInfo[ii][2];
                            secondMinBWColorI = ii;
                        }
                    }

                    if (startST > 0) {
                        if (adjust_cnt >= 20 && (startST + 2) < inclineInfoCnt && secondMinBWColorI > 0) {
                            if (inclineInfo[secondMinBWColorI][2] < pivot_black_boundary) {
                                InclineAndPeak[adjust_cnt][7] = inclineInfo[secondMinBWColorI][5];
                                InclineAndPeak[adjust_cnt][8] = inclineInfo[secondMinBWColorI][6];
                                this.log("222 쌍꺼풀로? ");
                            }
                        } else if (adjust_cnt >= 20 && (startST + 1) < inclineInfoCnt) {
                            if (thirdMinBWi > 0) {
                                if (inclineInfo[thirdMinBWi][0] - inclineInfo[secondMinBWi][0] < 17) {
                                    InclineAndPeak[adjust_cnt][7] = inclineInfo[thirdMinBWi][5];
                                    InclineAndPeak[adjust_cnt][8] = inclineInfo[thirdMinBWi][6];
                                    eyeBWi = secondMinBWi;
                                    this.log("BLACK THIRD 쌍꺼풀 ");
                                }
                            } else if (secondMinBWi > 0) {
                                if (inclineInfo[secondMinBWi][0] - inclineInfo[minBWi][0] < 12) {
                                    InclineAndPeak[adjust_cnt][7] = inclineInfo[minBWi][5];
                                    InclineAndPeak[adjust_cnt][8] = inclineInfo[minBWi][6];
                                    eyeBWi = minBWi;
                                    this.log("BLACK Second 쌍꺼풀 ");
                                }
                            }
                        }
                    }

                    this.log("---startST:" + startST + ",second COLOR: " + secondMinBWColor);

                    let minPreColorI = 0;
                    let minNextColorI = 0;
                    for (ii = minBWi - 1; ii >= 0; ii--) {
                        if (inclineInfo[ii][4] < 0) minPreColorI = ii;
                        else break;
                    }

                    for (ii = minBWi + 1; ii < inclineInfoCnt; ii++) {
                        if (inclineInfo[ii][4] < 0) minNextColorI = ii;
                        else break;
                    }

                    let minHeight = -1;
                    let minHeightColor = 1000;
                    let maxHeightColor = 1000;
                    let minHStep = 1;
                    let minHeightStartI = -1;
                    let minHeightEndI = -1;

                    for (ii = eyeBWi - 1; ii >= 0; ii--) {
                        if (inclineInfo[ii][4] < 0) {
                            minHeightStartI = ii;
                            break;
                        } else {
                            break;
                        }
                    }

                    minHeightEndI = minBWi;
                    for (ii = eyeBWi + 1; ii < inclineInfoCnt; ii++) {
                        if (inclineInfo[ii][4] > 0) minHeightEndI = ii;
                        else break;
                    }

                    if (eyeBWi > 0) {
                        if (secondMinBWColorI > eyeBWi) {
                            InclineAndPeak[adjust_cnt][9] = inclineInfo[secondMinBWColorI][0];
                            InclineAndPeak[adjust_cnt][5] = inclineInfo[secondMinBWColorI][5];
                            InclineAndPeak[adjust_cnt][6] = inclineInfo[secondMinBWColorI][6];
                        }
                        InclineAndPeak[adjust_cnt][0] = inclineInfo[eyeBWi][0];
                        InclineAndPeak[adjust_cnt][1] = inclineInfo[eyeBWi][5];
                        InclineAndPeak[adjust_cnt][2] = inclineInfo[eyeBWi][6];
                        this.log("---eyeBWi,cnt:" + InclineAndPeak[adjust_cnt][0] + ", X:" + InclineAndPeak[adjust_cnt][2] + ", Y:" + InclineAndPeak[adjust_cnt][1] + ", Before span:" + InclineAndPeak[adjust_cnt][3]);
                        adjust_cnt++;
                    }

                    line_cnt++;
                }

                if (adjust_cnt < 40) {
                    bean.setErrCode("눈 라인 수가 부족합니다.");
                    bean.setTex(tex);
                    return bean;
                }

                UpT = 10;
                let group_fail_cnt = 0;
                let group_cnt = 1;
                let group_gap = 0;
                const group_info = make2DArray(100, 5, 0);
                const group_info_lid = make2DArray(100, 5, 0);
                group_info[1][0] = 0;

                InclineAndPeak[0][4] = group_cnt;
                for (i = 0; i < adjust_cnt - 1; i++) {
                    if (InclineAndPeak[i + 1][0] <= InclineAndPeak[i][0] + UpT &&
                        InclineAndPeak[i + 1][0] >= InclineAndPeak[i][0] - UpT) {

                        if (InclineAndPeak[i + 1][0] > InclineAndPeak[i][0] + (UpT * 0.5) &&
                            InclineAndPeak[i + 1][0] < InclineAndPeak[i][0] - (UpT * 0.5)) {
                            this.log("보정:" + InclineAndPeak[i + 1][0]);
                            for (j = 0; j < 9; j++) {
                                InclineAndPeak[i + 1][j] = Math.trunc((InclineAndPeak[i + 1][j] + InclineAndPeak[i][j]) * 0.5);
                            }
                        }

                        InclineAndPeak[i + 1][4] = group_cnt;
                        group_info[group_cnt][0] += 1;
                    } else {
                        group_cnt++;
                        InclineAndPeak[i + 1][4] = group_cnt;
                        group_info[group_cnt][0] = 1;
                    }
                }

                let temp_mid = Math.trunc(adjust_cnt * 0.15);
                let temp_right = Math.trunc(adjust_cnt * 0.7);
                let avg_top_line = 0;
                let max_top_line = InclineAndPeak[temp_mid][0];
                let mid_pos = 0, left_pos = 0, right_pos = (adjust_cnt - 1), max_top_pos = temp_mid, max_top_pos_r = temp_mid;
                let inc_cnt2 = 0;
                let continue_fail = 0;
                let max_eye_height = 0;
                let low_eye_pos = temp_mid;

                for (i = temp_mid; i < temp_right; i++) {
                    if (group_info[InclineAndPeak[i + 1][4]][0] > 4) {
                        if (InclineAndPeak[i + 1][0] > max_top_line) {
                            max_top_line = InclineAndPeak[i + 1][0];
                            max_top_pos = i + 1;
                        }

                        if (InclineAndPeak[i + 1][3] > 0 && (InclineAndPeak[i + 1][0] - InclineAndPeak[i + 1][3]) > max_eye_height) {
                            max_eye_height = InclineAndPeak[i + 1][0] - InclineAndPeak[i + 1][3];
                            low_eye_pos = i + 1;
                        }
                    }
                }

                continue_fail = 0;
                let avg_pivot = InclineAndPeak[max_top_pos][0];
                let avg_pivot_cnt = 1;
                let descent_pivot = Math.trunc(UpT * 0.3);

                for (i = max_top_pos; i > 0; i--) {
                    if (i < (max_top_pos * 0.3)) descent_pivot = 0;

                    if ((InclineAndPeak[i - 1][0] < InclineAndPeak[i + continue_fail][0] + descent_pivot) &&
                        (InclineAndPeak[i - 1][0] >= InclineAndPeak[i + continue_fail][0] - UpT)) {
                        continue_fail = 0;
                        left_pos = i - 1;
                    } else {
                        if (InclineAndPeak[i - 1][9] > 0 &&
                            (InclineAndPeak[i - 1][9] < InclineAndPeak[i + continue_fail][0] + descent_pivot) &&
                            (InclineAndPeak[i - 1][9] >= InclineAndPeak[i + continue_fail][0] - UpT)) {
                            continue_fail = 0;
                            left_pos = i - 1;
                            InclineAndPeak[i - 1][0] = InclineAndPeak[i - 1][9];
                            InclineAndPeak[i - 1][1] = InclineAndPeak[i - 1][5];
                            InclineAndPeak[i - 1][2] = InclineAndPeak[i - 1][6];
                            continue;
                        }
                        InclineAndPeak[i - 1][11] = 1;

                        tot_fail_cnt++;
                        continue_fail++;
                        if (continue_fail > 4 && i < 10) {
                            this.log("Left Continue Fail!!!!! at : " + i);
                            break;
                        }
                    }
                }

                let incline_v = 0.0;
                let incline_avg = 0.0;
                let incline_tot = 0.0;
                let incline_cnt = 0;
                descent_pivot = Math.trunc(UpT * 0.3);

                for (i = max_top_pos; i < adjust_cnt - 1; i++) {
                    if (i > (max_top_pos * 0.7)) descent_pivot = 0;

                    if ((InclineAndPeak[i + 1][0] < (InclineAndPeak[i - continue_fail][0]) + descent_pivot) &&
                        (InclineAndPeak[i + 1][0] >= InclineAndPeak[i - continue_fail][0] - UpT) &&
                        (InclineAndPeak[i + 1][0] > InclineAndPeak[left_pos][0] + (UpT * 0.7))) {

                        if (InclineAndPeak[i + 1][0] > max_top_line) {
                            max_top_line = InclineAndPeak[i + 1][0];
                            max_top_pos = i + 1;
                        }

                        if (InclineAndPeak[i + 1][3] > 0 && (InclineAndPeak[i + 1][0] - InclineAndPeak[i + 1][3]) > max_eye_height) {
                            max_eye_height = InclineAndPeak[i + 1][0] - InclineAndPeak[i + 1][3];
                            low_eye_pos = i + 1;
                        }

                        InclineAndPeak[i + 1][11] = 1;

                        incline_v = (InclineAndPeak[i + 1][0] - InclineAndPeak[i - continue_fail][0]) / (continue_fail + 1);
                        incline_tot += incline_v;
                        incline_cnt += 1;
                        incline_avg = (incline_tot / incline_cnt);

                        if (i > Math.trunc(adjust_cnt * 0.8) && incline_v > (incline_avg * 0.3)) break;

                        continue_fail = 0;
                        right_pos = i + 1;
                    } else {
                        tot_fail_cnt++;
                        continue_fail++;
                        if (continue_fail > 4 && i > (adjust_cnt - 10)) {
                            this.log("Right Continue Fail!!!!!!");
                            break;
                        }
                    }
                }

                let left_mid_pos = 0;
                let right_mid_pos = 0;
                let adjust_pos_r = max_top_pos + Math.trunc((right_pos - max_top_pos) * 0.20);
                let adjust_pos_l = max_top_pos - Math.trunc((max_top_pos - left_pos) * 0.20);

                this.log("adjust_pos_l:" + adjust_pos_l);

                left_mid_pos = adjust_pos_l;
                for (ii = adjust_pos_l; ii > (max_top_pos - Math.trunc((max_top_pos - left_pos) * 0.4)); ii--) {
                    if (InclineAndPeak[ii][11] === 1) {
                        left_mid_pos = ii;
                        break;
                    }
                }

                right_mid_pos = adjust_pos_r;
                for (ii = adjust_pos_r; ii < (max_top_pos + Math.trunc((right_pos - max_top_pos) * 0.4)); ii++) {
                    if (InclineAndPeak[ii][11] === 1) {
                        right_mid_pos = ii;
                        break;
                    }
                }

                this.log("adjust_cnt:" + adjust_cnt);
                this.log("max_top_pos:" + max_top_pos);
                this.log("left_pos:" + left_pos);
                this.log("left_mid_pos:" + left_mid_pos);
                this.log("right_pos:" + right_pos);
                this.log("right_mid_pos:" + right_mid_pos);
                this.log("low_eye_pos:" + low_eye_pos);

                const input = make2DArray(adjust_cnt * 4, 2, 0);
                let clust_cnt = 0;

                for (i = 0; i < adjust_cnt; i++) {
                    for (j = 0; j < 4; j++) {
                        if (InclineAndPeak2[i][j][0] > 0) {
                            input[clust_cnt][0] = InclineAndPeak2[i][j][2];
                            input[clust_cnt][1] = InclineAndPeak2[i][j][1];
                            clust_cnt++;
                        }
                    }
                }

                this.log("clust cnt:" + clust_cnt);

                const sliceInput = input.slice(0, clust_cnt);

                const eps = 10.0;
                const minPts = 5;
                const maxYDeviation = 4;
                const maxGapX = 5;
                const enableCurvatureSplit = true;
                const curvatureSplitTol = 0.03;
                const minSegmentPts = 5;
                const curvatureStep = 3;

                const runResult = this.Run(
                    sliceInput,
                    eps,
                    minPts,
                    maxYDeviation,
                    maxGapX,
                    enableCurvatureSplit,
                    curvatureSplitTol,
                    minSegmentPts,
                    curvatureStep
                );

                const cleaned = runResult.cleaned;
                const labels = runResult.labels;

                const map = new Map();
                for (i = 0; i < cleaned.length; i++) {
                    const lb = labels[i];
                    if (!map.has(lb)) map.set(lb, []);
                    map.get(lb).push(cleaned[i]);
                }

                const clusterCount = map.size - (map.has(-1) ? 1 : 0);
                const noiseCount = map.has(-1) ? map.get(-1).length : 0;

                this.log(`[CurveClustering] total=${cleaned.length}, clusters=${clusterCount}, noise=${noiseCount}`);

                const clust_info = make2DArray(cleaned.length, 10, 0);
                let clust_slope = 0.0;
                let tot_x = 0, tot_y = 0;
                let tot_x_cnt = 0;
                let max_x = 0;
                let min_x = 0;
                let max_y = 0;
                let min_y = 0;
                i = 0;

                for (const [lb, list] of map.entries()) {
                    if (lb === -1) continue;

                    tot_x = 0;
                    tot_y = 0;
                    tot_x_cnt = 0;
                    max_x = 0;
                    min_x = 10000;

                    for (j = 0; j < list.length; j++) {
                        tot_x += list[j].x;
                        tot_y += list[j].y;

                        if (list[j].x > max_x) {
                            max_x = list[j].x;
                            max_y = list[j].y;
                        }
                        if (list[j].x < min_x) {
                            min_x = list[j].x;
                            min_y = list[j].y;
                        }
                        tot_x_cnt++;
                    }

                    clust_info[i][0] = tot_x_cnt;
                    clust_info[i][1] = (tot_x / tot_x_cnt);
                    clust_info[i][2] = (tot_y / tot_x_cnt);
                    clust_info[i][3] = ((min_y - max_y) / ((max_x - min_x) || 1));
                    clust_info[i][5] = max_x;
                    clust_info[i][6] = max_y;
                    clust_info[i][7] = min_x;
                    clust_info[i][8] = min_y;

                    this.log("clust i:" + i + ",cnt:" + clust_info[i][0] + ",x avg:" + clust_info[i][1] + ",y avg:" + clust_info[i][2] + ",slope:" + clust_info[i][3]);
                    i = i + 1;
                }

                this.log("left_pos: x " + InclineAndPeak[left_pos][2] + ",y:" + InclineAndPeak[left_pos][1]);
                this.log("right_pos: x " + InclineAndPeak[right_pos][2] + ",y:" + InclineAndPeak[right_pos][1]);

                for (i = 0; i < cleaned.length; i++) {
                    if (rl_code === 2) {
                        if (clust_info[i][1] > InclineAndPeak[max_top_pos][2] + 30 &&
                            clust_info[i][1] < InclineAndPeak[left_pos][2] &&
                            clust_info[i][2] > InclineAndPeak[left_pos][1] - 10 &&
                            clust_info[i][2] < InclineAndPeak[left_pos][1] + 30 &&
                            clust_info[i][3] < 0.5 && clust_info[i][3] >= -0.05) {
                            this.log("Find A:" + i);
                        }
                        if (clust_info[i][1] < InclineAndPeak[max_top_pos][2] - 30 &&
                            clust_info[i][1] > InclineAndPeak[right_pos][2] &&
                            clust_info[i][2] > InclineAndPeak[right_pos][1] - 20 &&
                            clust_info[i][2] < InclineAndPeak[right_pos][1] + 50 &&
                            clust_info[i][3] > -0.75 && clust_info[i][3] < 0.0) {
                            this.log("Find B:" + i);
                        }
                        if ((clust_info[i][1] > InclineAndPeak[max_top_pos][2] &&
                            clust_info[i][2] > InclineAndPeak[right_pos][1] + 50 &&
                            clust_info[i][2] < InclineAndPeak[right_pos][1] + 130 &&
                            clust_info[i][3] < 0.75 && clust_info[i][3] > 0.0) ||
                            (clust_info[i][1] < InclineAndPeak[max_top_pos][2] &&
                                clust_info[i][2] > InclineAndPeak[right_pos][1] + 50 &&
                                clust_info[i][2] < InclineAndPeak[right_pos][1] + 130 &&
                                clust_info[i][3] > -0.75 && clust_info[i][3] < 0.0)) {
                            this.log("Find C:" + i);
                        }
                    }
                }

                let pivot_v = 0;
                let pivot_i = 0;
                let end_point_cnt = 0;
                let eye_adjust_v = Math.trunc((InclineAndPeak[max_top_pos][0] - InclineAndPeak[left_pos][0]) * 0.6);
                const end_group = make2DArray(50, 3, 0);

                this.log("eye_adjust_v:" + eye_adjust_v + ", right pos:" + InclineAndPeak[right_pos][0]);

                for (i = right_mid_pos + 5; i < right_pos; i++) {
                    for (j = 0; j < 2; j++) {
                        if (InclineAndPeak2[i][j][0] > 0)
                            this.log("i:" + i + ",PIVOT V:" + InclineAndPeak2[i][j][0]);

                        if (InclineAndPeak2[i][j][0] >= (InclineAndPeak[right_pos][0] - eye_adjust_v) &&
                            InclineAndPeak2[i][j][0] <= InclineAndPeak[right_pos][0]) {
                            pivot_v = InclineAndPeak2[i][j][0];
                            pivot_i = i;
                            break;
                        }
                    }
                    if (pivot_i > 0) break;
                }

                this.log("find PIVOT V:" + pivot_v);

                for (i = pivot_i; i < right_pos; i++) {
                    for (j = 0; j < 2; j++) {
                        if (InclineAndPeak2[i][j][0] >= pivot_v && InclineAndPeak2[i][j][0] < pivot_v + 5) {
                            this.log("i:" + i + ",PIVOT V:" + InclineAndPeak2[i][j][0]);
                            pivot_v = InclineAndPeak2[i][j][0];
                            end_group[end_point_cnt][0] = InclineAndPeak2[i][j][0];
                            end_group[end_point_cnt][1] = InclineAndPeak2[i][j][1];
                            end_group[end_point_cnt][2] = InclineAndPeak2[i][j][2];
                            end_point_cnt++;
                            break;
                        }
                    }
                }

                let end_s = 0;
                let end_e = end_point_cnt - 1;
                let end_m = Math.trunc(end_point_cnt * 0.5);

                const arc1 = [[0, 0], [0, 0], [0, 0]];
                const arc2 = [[0, 0], [0, 0], [0, 0]];

                if (end_point_cnt > 0) {
                    arc1[0][0] = end_group[0][2];
                    arc1[0][1] = end_group[0][1];
                }
                if (end_point_cnt > 0) {
                    arc1[1][0] = end_group[Math.max(0, end_m)][2];

                    arc1[2][0] = end_group[Math.max(0, end_e)][2];
                    arc1[2][1] = end_group[Math.max(0, end_e)][1];
                }

                arc2[0][0] = InclineAndPeak[max_top_pos][2];
                arc2[0][1] = InclineAndPeak[max_top_pos][1];
                arc2[1][0] = InclineAndPeak[right_mid_pos][2];
                arc2[1][1] = InclineAndPeak[right_mid_pos][1];
                arc2[2][0] = InclineAndPeak[right_pos][2];
                arc2[2][1] = InclineAndPeak[right_pos][1];

                for (i = 0; i < 3; i++) {
                    this.log("arc1 x:" + arc1[i][0] + ",arc1 y:" + arc1[i][1]);
                    this.log("arc2 x:" + arc2[i][0] + ",arc2 y:" + arc2[i][1]);
                }

                let getPointXY = [0, 0];
                let circle1 = [0, 0, 0];
                let circle2 = [0, 0, 0];
                let intersections = null;
                let count = 0;

                if (end_point_cnt > 3) {
                    const ok1 = this.TryCircleFrom3Points(arc1[0], arc1[1], arc1[2]);
                    const ok2 = this.TryCircleFrom3Points(arc2[0], arc2[1], arc2[2]);

                    if (ok1.ok && ok2.ok) {
                        circle1 = ok1.circle;
                        circle2 = ok2.circle;
                        const inter = this.IntersectCircles(circle1, circle2);
                        count = inter.count;
                        intersections = inter.points;

                        this.log("count:" + count);
                        const refPoint = arc1[2];
                        const pick = this.PickClosestIntersection(intersections, count, refPoint);
                        if (pick.ok) {
                            getPointXY = pick.result;
                            this.log("getPointX:" + getPointXY[0] + ",Y:" + getPointXY[1]);
                        }
                    }
                }

                let spot_i = 0;
                let min_close = 10000;
                if (count > 0) {
                    for (i = right_mid_pos; i < right_pos; i++) {
                        if (Math.abs(InclineAndPeak[i][2] - Math.trunc(getPointXY[0])) < min_close) {
                            spot_i = i;
                            min_close = Math.abs(InclineAndPeak[i][2] - Math.trunc(getPointXY[0]));
                        }
                    }
                    this.log("new Right:" + spot_i + ",X:" + InclineAndPeak[spot_i][2]);

                    if (spot_i > 0) {
                        right_pos = spot_i;
                        adjust_pos_r = max_top_pos + Math.trunc((right_pos - max_top_pos) * 0.25);

                        right_mid_pos = adjust_pos_r;
                        for (ii = adjust_pos_r; ii < adjust_cnt; ii++) {
                            if (InclineAndPeak[ii][11] === 1) {
                                right_mid_pos = ii;
                                break;
                            }
                        }
                        this.log("New RIGHT MID:" + right_mid_pos);
                    }
                }

                group_cnt = 1;
                InclineAndPeak[0][10] = group_cnt;
                UpT = 5;
                group_info_lid[1][0] = 0;

                for (i = 0; i < adjust_cnt - 1; i++) {
                    if (InclineAndPeak[i + 1][5] > InclineAndPeak[max_top_pos][1] - 35) {
                        if (InclineAndPeak[i + 1][9] <= InclineAndPeak[i][9] + UpT &&
                            InclineAndPeak[i + 1][9] >= InclineAndPeak[i][9] - UpT) {
                            InclineAndPeak[i + 1][10] = group_cnt;
                            group_info_lid[group_cnt][0] += 1;
                        } else {
                            group_cnt++;
                            InclineAndPeak[i + 1][10] = group_cnt;
                            group_info_lid[group_cnt][0] = 1;
                        }
                    }
                }

                this.log("max top:" + InclineAndPeak[max_top_pos][1]);
                for (i = 0; i < adjust_cnt; i++) {
                    this.log("lid i:" + i + ",group cnt:" + InclineAndPeak[i][4] + ",cnt:" + InclineAndPeak[i][0] + ",x:" + InclineAndPeak[i][6] + ",y:" + InclineAndPeak[i][5] + ",lid_group:" + InclineAndPeak[i][10] + ",cnt:" + InclineAndPeak[i][9]);
                }

                let c_r = Array.from({ length: 10 }, () => new Coord());
                let lid_mid_pos = 0;
                let lid_left_pos = 0;
                let lid_right_pos = 0;
                let lid_cnt = 0;
                let lid_tot_cnt = 0;

                for (i = 1; i < adjust_cnt - 1; i++) {
                    if (group_info_lid[InclineAndPeak[i][10]][0] > 2 && InclineAndPeak[i][9] > 0) {
                        if (group_info[InclineAndPeak[i][4]][0] > 10) {
                            lid_tot_cnt++;
                        }
                    }
                }
                this.log("lid_tot_cnt:" + lid_tot_cnt);

                for (i = 1; i < adjust_cnt - 1; i++) {
                    if (group_info_lid[InclineAndPeak[i][10]][0] > 2 && InclineAndPeak[i][9] > 0) {
                        if (group_info[InclineAndPeak[i][4]][0] > 10) {
                            if (lid_cnt !== 0) {
                                lid_right_pos = i;
                                if (i >= right_pos + 5) break;
                            }
                            if (lid_cnt === 0) {
                                lid_left_pos = i;
                            }
                            if (lid_cnt === Math.trunc(lid_tot_cnt * 0.5))
                                lid_mid_pos = i;

                            lid_cnt++;
                        }
                    }
                }

                if (lid_mid_pos > 0) {
                    c_r[6].X = InclineAndPeak[lid_left_pos][2];
                    c_r[6].Y = InclineAndPeak[lid_left_pos][1] - InclineAndPeak[lid_left_pos][5] - 8;
                    c_r[7].X = InclineAndPeak[lid_mid_pos][2];
                    c_r[7].Y = InclineAndPeak[lid_mid_pos][1] - InclineAndPeak[lid_mid_pos][5] - 8;
                    c_r[8].X = InclineAndPeak[lid_right_pos][2];
                    c_r[8].Y = InclineAndPeak[lid_right_pos][1] - InclineAndPeak[lid_right_pos][5] - 8;

                    if (c_r[7].Y < c_r[6].Y) c_r[7].Y = c_r[6].Y + 3;
                    if (c_r[8].Y < c_r[7].Y) c_r[8].Y = c_r[7].Y + 6;
                }

                let low_eye_pos_y = 0;

                c_r[0].X = InclineAndPeak[left_pos][2];
                c_r[0].Y = InclineAndPeak[left_pos][1] + 5;
                c_r[1].X = InclineAndPeak[left_mid_pos][2];
                c_r[1].Y = InclineAndPeak[left_mid_pos][1] - 5;
                c_r[2].X = InclineAndPeak[max_top_pos][2];
                c_r[2].Y = InclineAndPeak[max_top_pos][1] - 5;
                c_r[3].X = InclineAndPeak[right_mid_pos][2];
                c_r[3].Y = InclineAndPeak[right_mid_pos][1] - 5;
                c_r[4].X = InclineAndPeak[right_pos][2];
                c_r[4].Y = InclineAndPeak[right_pos][1] + 5;

                this.log("----max_eye_height:" + max_eye_height);

                if (rl_code === 1) {
                    bean.setEye_r(c_r);
                    bean.setCenterX(c_r[0].X);
                    bean.setCenterY(c_r[0].Y);
                } else {
                    bean.setEye_l(c_r);
                    bean.setCenterX(Math.trunc((bean.getCenterX() + c_r[0].X) / 2));
                    bean.setCenterY(Math.trunc((bean.getCenterY() + c_r[0].Y) / 2));
                    this.log("눈 중앙 : " + bean.getCenterX() + "," + bean.getCenterY());
                }

                if (rl_code === 1) {
                    bean.setEyeRL(tot_fail_cnt);
                    for (i = 0; i < 9; i++) {
                        this.log("eye_r[" + i + "].X = " + c_r[i].X + "; eye_r[" + i + "].Y = " + c_r[i].Y + ";");
                    }
                } else {
                    if (bean.getEyeRL() > tot_fail_cnt) bean.setEyeRL(2);
                    else bean.setEyeRL(1);

                    for (i = 0; i < 9; i++) {
                        this.log("eye_l[" + i + "].X = " + c_r[i].X + "; eye_l[" + i + "].Y = " + c_r[i].Y + ";");
                    }

                    c_r = bean.getEye_r();
                    for (i = 0; i < 9; i++) {
                        this.log("eye_r[" + i + "].X = " + c_r[i].X + "; eye_r[" + i + "].Y = " + c_r[i].Y + ";");
                    }
                }

                for (i = left_pos; i < right_pos; i++) {
                    yUnity = (this.height - 1 - InclineAndPeak[i][1]) * this.width + InclineAndPeak[i][2];
                    this.setPixelByIndex(yUnity, colorR);
                    yUnity = (this.height - 1 - InclineAndPeak[i][1]) * this.width + InclineAndPeak[i][2] + 1;
                    this.setPixelByIndex(yUnity, colorR);
                    yUnity = (this.height - 1 - InclineAndPeak[i][1]) * this.width + InclineAndPeak[i][2] - 1;
                    this.setPixelByIndex(yUnity, colorR);

                    if (InclineAndPeak[i][7] > 0) {
                        yUnity = (this.height - 1 - InclineAndPeak[i][7]) * this.width + InclineAndPeak[i][8];
                        this.setPixelByIndex(yUnity, colorBLK);
                        yUnity = (this.height - 1 - InclineAndPeak[i][7]) * this.width + InclineAndPeak[i][8] + 1;
                        this.setPixelByIndex(yUnity, colorBLK);
                        yUnity = (this.height - 1 - InclineAndPeak[i][7]) * this.width + InclineAndPeak[i][8] - 1;
                        this.setPixelByIndex(yUnity, colorBLK);
                    }

                    if (InclineAndPeak[i][9] > 0) {
                        yUnity = (this.height - 1 - InclineAndPeak[i][5]) * this.width + InclineAndPeak[i][6];
                        this.setPixelByIndex(yUnity, colorG);
                        yUnity = (this.height - 1 - InclineAndPeak[i][5]) * this.width + InclineAndPeak[i][6] + 1;
                        this.setPixelByIndex(yUnity, colorG);
                        yUnity = (this.height - 1 - InclineAndPeak[i][5]) * this.width + InclineAndPeak[i][6] - 1;
                        this.setPixelByIndex(yUnity, colorG);
                    }
                }

                for (i = left_pos; i < right_pos; i++) {
                    for (j = 0; j < 6; j++) {
                        if (InclineAndPeak2[i][j][0] > 0) {
                            yUnity = (this.height - 1 - InclineAndPeak2[i][j][1]) * this.width + InclineAndPeak2[i][j][2];
                            this.setPixelByIndex(yUnity, colorY);
                            yUnity = (this.height - 1 - InclineAndPeak2[i][j][1]) * this.width + InclineAndPeak2[i][j][2] + 1;
                            this.setPixelByIndex(yUnity, colorY);
                            yUnity = (this.height - 1 - InclineAndPeak2[i][j][1]) * this.width + InclineAndPeak2[i][j][2] - 1;
                            this.setPixelByIndex(yUnity, colorY);
                        }
                    }
                }

                bean.setTex(tex);
                return bean;
            }

            setPixelByIndex(index, color) {
                if (index < 0 || index >= this.width * this.height) return;
                const di = index * 4;
                if (di < 0 || di + 3 >= this.pixels.length) return;
                this.pixels[di] = color[0];
                this.pixels[di + 1] = color[1];
                this.pixels[di + 2] = color[2];
                this.pixels[di + 3] = color[3];
            }

            TryGetCircleFrom3Points(a, b, c) {
                const ax = a[0], ay = a[1];
                const bx = b[0], by = b[1];
                const cx = c[0], cy = c[1];

                const d = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
                const EPS = 1e-6;
                if (Math.abs(d) < EPS) return { ok: false, circle: [0, 0, 0] };

                const ax2ay2 = ax * ax + ay * ay;
                const bx2by2 = bx * bx + by * by;
                const cx2cy2 = cx * cx + cy * cy;

                const ux = (ax2ay2 * (by - cy) + bx2by2 * (cy - ay) + cx2cy2 * (ay - by)) / d;
                const uy = (ax2ay2 * (cx - bx) + bx2by2 * (ax - cx) + cx2cy2 * (bx - ax)) / d;
                const r = Math.sqrt((ux - ax) * (ux - ax) + (uy - ay) * (uy - ay));

                return { ok: true, circle: [ux, uy, r] };
            }

            Dist(x, y, cx, cy) {
                const dx = x - cx;
                const dy = y - cy;
                return Math.sqrt(dx * dx + dy * dy);
            }

            IntersectCircles(c1, c2) {
                let points = [null, null];
                const x0 = c1[0], y0 = c1[1], r0 = c1[2];
                const x1 = c2[0], y1 = c2[1], r1 = c2[2];

                const dx = x1 - x0;
                const dy = y1 - y0;
                const d = Math.sqrt(dx * dx + dy * dy);
                const EPS = 1e-6;

                if (d > r0 + r1 || d < Math.abs(r0 - r1) || d < EPS) {
                    return { count: 0, points };
                }

                const a = (r0 * r0 - r1 * r1 + d * d) / (2 * d);
                const h2 = r0 * r0 - a * a;

                if (h2 < EPS) {
                    const xm = x0 + a * dx / d;
                    const ym = y0 + a * dy / d;
                    points[0] = [xm, ym];
                    return { count: 1, points };
                }

                const h = Math.sqrt(h2);
                const xm2 = x0 + a * dx / d;
                const ym2 = y0 + a * dy / d;
                const rx = -dy * (h / d);
                const ry = dx * (h / d);

                points[0] = [xm2 + rx, ym2 + ry];
                points[1] = [xm2 - rx, ym2 - ry];
                return { count: 2, points };
            }

            Distance(a, b) {
                const dx = a[0] - b[0];
                const dy = a[1] - b[1];
                return Math.sqrt(dx * dx + dy * dy);
            }

            PickClosestIntersection(intersections, count, refPoint) {
                if (count === 0) return { ok: false, result: null };
                let result = intersections[0];
                let minDist = this.Distance(intersections[0], refPoint);

                if (count === 2) {
                    const d2 = this.Distance(intersections[1], refPoint);
                    if (d2 < minDist) result = intersections[1];
                }
                return { ok: true, result };
            }

            GetRgbTopLeft(x, yTop) {
                let r = 0, g = 0, b = 0;

                if (x < 0 || x >= this.width || yTop < 0 || yTop >= this.height)
                    return { r, g, b };

                const idx = (this.height - 1 - yTop) * this.width + x;
                const di = idx * 4;

                r = this.pixels[di];
                g = this.pixels[di + 1];
                b = this.pixels[di + 2];

                return { r, g, b };
            }

            Run(input, eps = 10.0, minPts = 5, maxYDeviation = 4, maxGapX = 4,
                enableCurvatureSplit = true, curvatureSplitTol = 0.06, minSegmentPts = 6, curvatureStep = 2) {
                if (!input || input.length === 0) {
                    return { cleaned: [], labels: [] };
                }

                const cleanedList = this.Preprocess(input, maxYDeviation, maxGapX);
                const n = cleanedList.length;
                if (n === 0) return { cleaned: [], labels: [] };

                const cleaned = cleanedList;
                let labels = this.DBSCAN(cleaned, eps, minPts);

                if (enableCurvatureSplit) {
                    labels = this.SplitByCurvatureAlongX(
                        cleaned,
                        labels,
                        maxGapX,
                        curvatureSplitTol,
                        minSegmentPts,
                        curvatureStep
                    );
                }

                return { cleaned, labels };
            }

            Preprocess(input, maxYDeviation, maxGapX) {
                const set = new Set();
                const list = [];

                for (let i = 0; i < input.length; i++) {
                    const x = input[i][0];
                    const y = input[i][1];
                    const key = `${x}_${y}`;
                    if (!set.has(key)) {
                        set.add(key);
                        list.push({ x, y });
                    }
                }

                list.sort((a, b) => {
                    const c = a.x - b.x;
                    return c !== 0 ? c : a.y - b.y;
                });

                if (list.length <= 2) return list;

                const cleaned = [];
                cleaned.push(list[0]);
                cleaned.push(list[1]);

                for (let i = 2; i < list.length; i++) {
                    const p0 = cleaned[cleaned.length - 2];
                    const p1 = cleaned[cleaned.length - 1];
                    const p2 = list[i];

                    const dx01 = p1.x - p0.x;
                    const dx12 = p2.x - p1.x;

                    if (dx12 > maxGapX || dx12 <= 0 || dx01 <= 0) {
                        cleaned.push(p2);
                        continue;
                    }

                    const slope = (p1.y - p0.y) / dx01;
                    const yPred = p1.y + slope * dx12;

                    if (Math.abs(p2.y - yPred) <= maxYDeviation) {
                        cleaned.push(p2);
                    }
                }

                return cleaned;
            }

            DBSCAN(pts, eps, minPts) {
                const n = pts.length;
                const labels = new Array(n).fill(0);
                const eps2 = eps * eps;
                const cell = Math.max(1e-3, eps);
                const grid = new Map();

                for (let i = 0; i < n; i++) {
                    const c = this.CellOf(pts[i], cell);
                    const key = this.Pack(c.cx, c.cy);
                    if (!grid.has(key)) grid.set(key, []);
                    grid.get(key).push(i);
                }

                let clusterId = 0;
                const neighbors = [];
                const queue = [];

                for (let i = 0; i < n; i++) {
                    if (labels[i] !== 0) continue;

                    neighbors.length = 0;
                    this.RegionQuery(i, pts, grid, cell, eps2, neighbors);

                    if (neighbors.length < minPts) {
                        labels[i] = -1;
                        continue;
                    }

                    clusterId++;
                    labels[i] = clusterId;

                    queue.length = 0;
                    for (let k = 0; k < neighbors.length; k++) {
                        const p = neighbors[k];
                        if (p === i) continue;
                        queue.push(p);
                    }

                    while (queue.length > 0) {
                        const p = queue.shift();

                        if (labels[p] === -1) labels[p] = clusterId;
                        if (labels[p] !== 0) continue;

                        labels[p] = clusterId;

                        neighbors.length = 0;
                        this.RegionQuery(p, pts, grid, cell, eps2, neighbors);

                        if (neighbors.length >= minPts) {
                            for (let k = 0; k < neighbors.length; k++) {
                                const q = neighbors[k];
                                if (labels[q] === 0 || labels[q] === -1) {
                                    queue.push(q);
                                }
                            }
                        }
                    }
                }

                return labels;
            }

            RegionQuery(idx, pts, grid, cell, eps2, outNeighbors) {
                const c = this.CellOf(pts[idx], cell);

                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const key = this.Pack(c.cx + dx, c.cy + dy);
                        if (!grid.has(key)) continue;
                        const cand = grid.get(key);

                        for (let i = 0; i < cand.length; i++) {
                            const j = cand[i];
                            const ddx = pts[j].x - pts[idx].x;
                            const ddy = pts[j].y - pts[idx].y;
                            if (ddx * ddx + ddy * ddy <= eps2) outNeighbors.push(j);
                        }
                    }
                }
            }

            CellOf(p, cell) {
                return {
                    cx: Math.floor(p.x / cell),
                    cy: Math.floor(p.y / cell)
                };
            }

            Pack(a, b) {
                return `${a}:${b}`;
            }

            SplitByCurvatureAlongX(pts, labels, maxGapX, curvatureSplitTol, minSegmentPts, step) {
                const n = pts.length;
                step = Math.max(1, Math.min(step, 5));

                const clusters = new Map();
                for (let i = 0; i < n; i++) {
                    const lb = labels[i];
                    if (lb <= 0) continue;
                    if (!clusters.has(lb)) clusters.set(lb, []);
                    clusters.get(lb).push(i);
                }

                const newLabels = new Array(n).fill(-1);
                let nextLabel = 0;

                for (const [_, idxs] of clusters.entries()) {
                    idxs.sort((a, b) => {
                        const c = pts[a].x - pts[b].x;
                        return c !== 0 ? c : pts[a].y - pts[b].y;
                    });

                    const k = this.ComputeCurvatureSeries(pts, idxs, step);

                    let start = 0;
                    let mean = 0;
                    let mcnt = 0;

                    const init = Math.min(minSegmentPts, idxs.length);
                    for (let i = 0; i < init; i++) {
                        mean += k[i];
                        mcnt++;
                    }
                    mean /= Math.max(1, mcnt);

                    for (let i = init; i < idxs.length; i++) {
                        const prevIdx = idxs[i - 1];
                        const curIdx = idxs[i];
                        const dx = pts[curIdx].x - pts[prevIdx].x;
                        const gapBreak = dx > maxGapX;
                        const curvBreak = Math.abs(k[i] - mean) > curvatureSplitTol;

                        if (gapBreak || curvBreak) {
                            const leftLen = i - start;
                            const rightLen = idxs.length - i;

                            if (leftLen >= minSegmentPts && rightLen >= minSegmentPts) {
                                for (let t = start; t < i; t++) {
                                    newLabels[idxs[t]] = nextLabel;
                                }
                                nextLabel++;
                                start = i;
                                mean = k[i];
                                mcnt = 1;
                                continue;
                            }
                        }

                        mean = (mean * mcnt + k[i]) / (mcnt + 1);
                        mcnt++;
                    }

                    const lastLen = idxs.length - start;
                    if (lastLen >= minSegmentPts) {
                        for (let t = start; t < idxs.length; t++) {
                            newLabels[idxs[t]] = nextLabel;
                        }
                        nextLabel++;
                    }
                }

                return newLabels;
            }

            ComputeCurvatureSeries(pts, idxList, step) {
                const m = idxList.length;
                const k = new Array(m).fill(0);

                for (let i = 0; i < m; i++) {
                    const i0 = i - step;
                    const i2 = i + step;
                    if (i0 < 0 || i2 >= m) {
                        k[i] = 0;
                        continue;
                    }

                    const A = pts[idxList[i0]];
                    const B = pts[idxList[i]];
                    const C = pts[idxList[i2]];

                    const AB = { x: B.x - A.x, y: B.y - A.y };
                    const AC = { x: C.x - A.x, y: C.y - A.y };
                    const BC = { x: C.x - B.x, y: C.y - B.y };
                    const CA = { x: A.x - C.x, y: A.y - C.y };

                    const a = Math.sqrt(AB.x * AB.x + AB.y * AB.y);
                    const b = Math.sqrt(BC.x * BC.x + BC.y * BC.y);
                    const c = Math.sqrt(CA.x * CA.x + CA.y * CA.y);
                    const denom = a * b * c;

                    if (denom < 1e-6) {
                        k[i] = 0;
                        continue;
                    }

                    const twiceArea = AB.x * AC.y - AB.y * AC.x;
                    const curv = (2 * twiceArea) / denom;
                    k[i] = Math.abs(curv);
                }

                return k;
            }
        }

        function buildResultText(bean) {
            const lines = [];
            lines.push("errCode: " + (bean.getErrCode() || ""));
            lines.push("center: " + bean.getCenterX() + ", " + bean.getCenterY());
            lines.push("eyeRL: " + bean.getEyeRL());
            lines.push("");
            lines.push("[eye_r]");
            bean.getEye_r().forEach((p, idx) => {
                lines.push(idx + ": (" + p.X + ", " + p.Y + ")");
            });
            lines.push("");
            lines.push("[eye_l]");
            bean.getEye_l().forEach((p, idx) => {
                lines.push(idx + ": (" + p.X + ", " + p.Y + ")");
            });
            return lines.join("\n");
        }

        async function loadAndRender() {
            const debugLines = [];
            const logger = (msg) => debugLines.push(msg);

            try {
                statusText.textContent = '저장된 이미지를 확인하는 중...';

                const blob = await loadBlobFromDB();

                if (!blob) {
                    statusText.textContent = '저장된 이미지가 없습니다.';
                    imageInfo.textContent = 'capture.html에서 먼저 촬영 또는 업로드를 진행하세요.';
                    detectInfo.textContent = '이미지가 없습니다.';
                    debugLogEl.textContent = '이미지가 없습니다.';
                    return;
                }

                const { img } = await loadImageFromBlob(blob);

                hiddenCanvas.width = img.naturalWidth || img.width;
                hiddenCanvas.height = img.naturalHeight || img.height;
                const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
                hiddenCtx.clearRect(0, 0, hiddenCanvas.width, hiddenCanvas.height);
                hiddenCtx.drawImage(img, 0, 0);

                const imageData = hiddenCtx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height);
                const bean = new FaceBean(imageData, hiddenCanvas.width, hiddenCanvas.height);

                const detector = new DetectEyesJS(logger);
                detector.DetectMain(bean);

                hiddenCtx.putImageData(bean.imageData, 0, 0);

                displayCanvas.width = hiddenCanvas.width;
                displayCanvas.height = hiddenCanvas.height;
                displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
                displayCtx.drawImage(hiddenCanvas, 0, 0);

                imageInfo.textContent =
                    `해상도: ${hiddenCanvas.width} × ${hiddenCanvas.height} / 타입: ${blob.type || 'unknown'} / 크기: ${(blob.size / 1024 / 1024).toFixed(2)} MB`;

                detectInfo.textContent = buildResultText(bean);
                debugLogEl.textContent = debugLines.join('\n');
                statusText.textContent = '이미지 로드 및 분석 완료';
            } catch (err) {
                console.error(err);
                statusText.textContent = '이미지 불러오기에 실패했습니다.';
                imageInfo.textContent = 'IndexedDB 또는 이미지 디코딩 과정에서 오류가 발생했습니다.';
                detectInfo.textContent = '눈 분석 중 오류가 발생했습니다.';
                debugLogEl.textContent = String(err && err.stack ? err.stack : err);
            }
        }

        document.getElementById('backBtn').addEventListener('click', () => {
            history.back();
        });

        document.getElementById('reloadBtn').addEventListener('click', async () => {
            await loadAndRender();
        });

        loadAndRender();
    </script>
</body>
