<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>면접 연습 UI + MediaPipe 얼굴영역</title>
    <style>
        :root {
            --bg: #eef4ff;
            --card: #ffffff;
            --primary: #5f8fe8;
            --primary-soft: #dbe7ff;
            --text: #1f2430;
            --muted: #8b95a7;
            --border: #e7edf8;
            --shadow: 0 12px 30px rgba(91, 125, 188, 0.12);
            --danger: #ff5f57;
            --dark-chip: rgba(35, 40, 52, 0.64);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
            color: var(--text);
            min-height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 10px;
        }

        .phone {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background: linear-gradient(180deg, #f9fbff 0%, #edf4ff 100%);
            border-radius: 38px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.16);
            position: relative;
            border: 1px solid #dfe6f3;
        }

        .safe-top {
            height: env(safe-area-inset-top, 20px);
            background: transparent;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            padding: 18px 20px 14px;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            background: rgba(249, 251, 255, 0.92);
            backdrop-filter: blur(10px);
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 14px;
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--primary);
            font-size: 28px;
            line-height: 1;
            cursor: pointer;
        }

        .content {
            padding: 14px 16px calc(110px + env(safe-area-inset-bottom, 0px));
        }

        .main-card {
            background: rgba(255,255,255,0.72);
            border-radius: 34px;
            padding: 18px 16px 22px;
            border: 1px solid rgba(223, 233, 249, 0.9);
            box-shadow: var(--shadow);
        }

        .question-bubble {
            position: relative;
            background: var(--card);
            border-radius: 28px;
            padding: 18px 18px 20px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            box-shadow: 0 8px 24px rgba(132, 155, 201, 0.12);
        }

            .question-bubble::after {
                content: "";
                position: absolute;
                left: 36px;
                bottom: -12px;
                width: 0;
                height: 0;
                border-left: 10px solid transparent;
                border-right: 10px solid transparent;
                border-top: 14px solid #fff;
                filter: drop-shadow(0 4px 4px rgba(132, 155, 201, 0.08));
            }

        .q-icon {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(180deg, #70a1ec 0%, #4f84db 100%);
            color: white;
            display: grid;
            place-items: center;
            font-size: 28px;
            font-weight: 800;
            flex: 0 0 auto;
            box-shadow: 0 8px 18px rgba(79, 132, 219, 0.25);
        }

        .q-title {
            margin: 2px 0 6px;
            font-size: 21px;
            font-weight: 800;
            line-height: 1.3;
        }

        .q-sub {
            margin: 0;
            color: #768194;
            font-size: 14px;
            line-height: 1.5;
        }

        .video-frame {
            margin-top: 28px;
            position: relative;
            border-radius: 26px;
            overflow: hidden;
            background: linear-gradient(180deg, #f7f8fb 0%, #edf1f6 100%);
            border: 1px solid #e5eaf3;
            aspect-ratio: 4 / 4.1;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
        }

        .media-wrap {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 25%, rgba(132, 162, 220, 0.12), transparent 24%), radial-gradient(circle at 70% 80%, rgba(132, 162, 220, 0.08), transparent 24%), linear-gradient(180deg, #fafbfd 0%, #eef2f8 100%);
        }

        #video,
        #canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mirror {
            transform: scaleX(-1);
        }

        .placeholder-guide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 1;
        }

        .face-guide {
            width: 72%;
            max-width: 270px;
            aspect-ratio: 0.82;
            border-radius: 26px;
            border: 2px dashed rgba(185, 200, 230, 0.8);
            background: rgba(255,255,255,0.18);
            display: grid;
            place-items: center;
            color: #7b8ba5;
            font-size: 15px;
            font-weight: 700;
            backdrop-filter: blur(2px);
        }

        .top-controls {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            z-index: 5;
        }

        .mini-btn,
        .camera-btn,
        .video-badge {
            backdrop-filter: blur(10px);
        }

        .mini-btn {
            border: none;
            height: 36px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.92);
            color: #456fb5;
            font-weight: 800;
            font-size: 13px;
            box-shadow: 0 6px 16px rgba(92, 119, 163, 0.14);
            cursor: pointer;
        }

            .mini-btn:disabled,
            .camera-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

        .video-badge,
        .camera-btn {
            position: absolute;
            bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            z-index: 5;
        }

        .video-badge {
            left: 14px;
            padding: 10px 14px;
            background: rgba(40, 43, 51, 0.46);
            color: white;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .camera-btn {
            right: 14px;
            width: 58px;
            height: 58px;
            border: none;
            background: rgba(255,255,255,0.95);
            color: var(--primary);
            font-size: 28px;
            box-shadow: 0 10px 22px rgba(92, 119, 163, 0.18);
            cursor: pointer;
        }

        .metric-layer {
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 86px;
            z-index: 6;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            pointer-events: none;
        }

        .metric-chip {
            background: var(--dark-chip);
            color: #fff;
            border-radius: 16px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
            box-shadow: 0 8px 16px rgba(21, 28, 42, 0.15);
        }

            .metric-chip strong {
                font-size: 11px;
                color: rgba(255,255,255,0.78);
                font-weight: 700;
                letter-spacing: 0.02em;
            }

            .metric-chip span {
                font-size: 13px;
                font-weight: 800;
                color: #fff;
            }

        .record-label {
            margin: 20px 0 12px;
            text-align: center;
            font-size: 17px;
            color: #6f7b8f;
            font-weight: 500;
        }

        .control-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 14px;
            padding: 0 4px;
        }

        .ghost-space {
            min-width: 1px;
        }

        .record-btn {
            width: 132px;
            height: 132px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 35% 30%, #ff7f72 0%, var(--danger) 62%, #ff4f45 100%);
            box-shadow: 0 0 0 10px rgba(255, 95, 87, 0.12), 0 12px 28px rgba(255, 95, 87, 0.28), inset 0 8px 12px rgba(255,255,255,0.2);
            color: white;
            font-size: 58px;
            cursor: pointer;
            display: grid;
            place-items: center;
            justify-self: center;
        }

        .next-btn {
            justify-self: end;
            border: 1px solid #d9e5fb;
            background: linear-gradient(180deg, #ffffff 0%, #f4f8ff 100%);
            color: var(--primary);
            font-size: 18px;
            font-weight: 800;
            border-radius: 999px;
            padding: 18px 22px;
            box-shadow: 0 10px 20px rgba(111, 145, 202, 0.14);
            cursor: pointer;
            white-space: nowrap;
        }

        .bottom-nav {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            border: 1px solid #e7edf8;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            box-shadow: 0 10px 28px rgba(94, 120, 165, 0.14);
            overflow: hidden;
        }

        .nav-item {
            padding: 14px 10px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #8d98ac;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            position: relative;
        }

            .nav-item + .nav-item::before {
                content: "";
                position: absolute;
                left: 0;
                top: 18px;
                bottom: 18px;
                width: 1px;
                background: #ebf0f8;
            }

            .nav-item .icon {
                font-size: 24px;
                line-height: 1;
            }

            .nav-item.active {
                color: var(--primary);
            }

        @media (max-width: 380px) {
            .q-title {
                font-size: 18px;
            }

            .record-btn {
                width: 112px;
                height: 112px;
                font-size: 50px;
            }

            .next-btn {
                padding: 16px 18px;
                font-size: 16px;
            }

            .metric-layer {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }

            .metric-chip {
                padding: 7px 9px;
            }
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="safe-top"></div>

        <header class="header">
            <button class="back-btn" aria-label="뒤로 가기">‹</button>
            면접 연습 중...
        </header>

        <main class="content">
            <section class="main-card">
                <div class="question-bubble">
                    <div class="q-icon">?</div>
                    <div>
                        <h1 class="q-title">자기소개해보세요</h1>
                        <p class="q-sub">자신을 간단히 소개해주세요.</p>
                    </div>
                </div>

                <section class="video-frame" aria-label="카메라 및 MediaPipe 표시 영역">
                    <div class="media-wrap">
                        <video id="video" autoplay playsinline muted></video>
                        <canvas id="canvas"></canvas>
                        <div id="placeholderGuide" class="placeholder-guide">
                            <div class="face-guide">MediaPipe 얼굴 영역</div>
                        </div>
                    </div>

                    <div class="top-controls">
                        <button id="startBtn" class="mini-btn">START</button>
                        <button id="stopBtn" class="mini-btn" disabled>STOP</button>
                    </div>

                    <div class="metric-layer">
                        <div class="metric-chip"><strong>GazeX</strong><span id="gazeX">0.00</span></div>
                        <div class="metric-chip"><strong>GazeY</strong><span id="gazeY">0.00</span></div>
                        <div class="metric-chip"><strong>Yaw</strong><span id="yaw">0.0</span></div>
                        <div class="metric-chip"><strong>Pitch</strong><span id="pitch">0.0</span></div>
                        <div class="metric-chip"><strong>Smile</strong><span id="smile">0.00</span></div>
                        <div class="metric-chip"><strong>JawOpen</strong><span id="jaw">0.00</span></div>
                        <div class="metric-chip"><strong>Blink</strong><span id="blinkCount">0</span></div>
                        <div class="metric-chip"><strong>EyeMove</strong><span id="eyeMoveCount">0</span></div>
                    </div>

                    <div class="video-badge" id="deviceBadge">대기 중</div>
                    <button class="camera-btn" id="cameraSwitchBtn" aria-label="카메라 전환">📷</button>
                </section>

                <div class="record-label">답변 녹음 시작</div>

                <div class="control-row">
                    <div class="ghost-space"></div>
                    <button class="record-btn" aria-label="녹음 시작">🎙</button>
                    <button class="next-btn">다음 질문</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="하단 내비게이션">
            <a href="#" class="nav-item active">
                <div class="icon">⌂</div>
                <div>홈</div>
            </a>
            <a href="#" class="nav-item">
                <div class="icon">▥</div>
                <div>피드백</div>
            </a>
            <a href="#" class="nav-item">
                <div class="icon">◯</div>
                <div>프로필</div>
            </a>
        </nav>
    </div>

    <script type="module">
        import {
            FaceLandmarker,
            FilesetResolver,
            DrawingUtils
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const placeholderGuide = document.getElementById("placeholderGuide");
        const deviceBadge = document.getElementById("deviceBadge");
        const cameraSwitchBtn = document.getElementById("cameraSwitchBtn");

        const gazeXEl = document.getElementById("gazeX");
        const gazeYEl = document.getElementById("gazeY");
        const yawEl = document.getElementById("yaw");
        const pitchEl = document.getElementById("pitch");
        const smileEl = document.getElementById("smile");
        const jawEl = document.getElementById("jaw");
        const blinkCountEl = document.getElementById("blinkCount");
        const eyeMoveCountEl = document.getElementById("eyeMoveCount");

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");

        let faceLandmarker = null;
        let drawingUtils = null;
        let stream = null;
        let running = false;
        let rafId = 0;

        let blinkCount = 0;
        let eyeClosed = false;
        let prevGazeX = null;
        let prevGazeY = null;
        let eyeMoveCount = 0;

        let isMobile = false;
        let currentFacingMode = "user";

        function detectMobile() {
            const ua = navigator.userAgent || navigator.vendor || window.opera || "";
            const byUA = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
            const byTouch = navigator.maxTouchPoints > 1 && window.innerWidth <= 1024;
            return byUA || byTouch;
        }

        function updateDeviceBadge() {
            if (isMobile) {
                deviceBadge.textContent = currentFacingMode === "user" ? "모바일 전면" : "모바일 후면";
            } else {
                deviceBadge.textContent = "PC 웹캠";
            }
        }

        function applyMirror() {
            const shouldMirror = !isMobile || currentFacingMode === "user";
            video.classList.toggle("mirror", shouldMirror);
            canvas.classList.toggle("mirror", shouldMirror);
        }

        function getVideoConstraints() {
            if (isMobile) {
                return {
                    facingMode: { ideal: currentFacingMode },
                    width: { ideal: 720 },
                    height: { ideal: 960 }
                };
            }

            return {
                width: { ideal: 1280 },
                height: { ideal: 720 }
            };
        }

        function dist(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function clamp(v, min, max) {
            return Math.max(min, Math.min(max, v));
        }

        function calcEAR(lm, left = true) {
            let outer, inner, top1, top2, bottom1, bottom2;

            if (left) {
                outer = lm[33];
                inner = lm[133];
                top1 = lm[159];
                top2 = lm[158];
                bottom1 = lm[145];
                bottom2 = lm[153];
            } else {
                outer = lm[362];
                inner = lm[263];
                top1 = lm[386];
                top2 = lm[385];
                bottom1 = lm[374];
                bottom2 = lm[380];
            }

            const w = dist(outer, inner);
            const h = (dist(top1, bottom1) + dist(top2, bottom2)) * 0.5;
            if (w <= 1e-6) return 0;
            return h / w;
        }

        function resetCounters() {
            blinkCount = 0;
            eyeClosed = false;
            prevGazeX = null;
            prevGazeY = null;
            eyeMoveCount = 0;

            gazeXEl.innerText = "0.00";
            gazeYEl.innerText = "0.00";
            yawEl.innerText = "0.0";
            pitchEl.innerText = "0.0";
            smileEl.innerText = "0.00";
            jawEl.innerText = "0.00";
            blinkCountEl.innerText = "0";
            eyeMoveCountEl.innerText = "0";
        }

        async function ensureInitialized() {
            if (faceLandmarker) return;

            const fileset = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
            );

            faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task"
                },
                runningMode: "VIDEO",
                outputFaceBlendshapes: true,
                outputFacialTransformationMatrixes: true,
                numFaces: 1
            });

            drawingUtils = new DrawingUtils(ctx);
        }

        async function start() {
            if (running) return;

            try {
                await ensureInitialized();

                isMobile = detectMobile();
                if (isMobile && !currentFacingMode) currentFacingMode = "user";
                applyMirror();
                updateDeviceBadge();

                stream = await navigator.mediaDevices.getUserMedia({
                    video: getVideoConstraints(),
                    audio: false
                });

                video.srcObject = stream;
                await video.play();

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                placeholderGuide.style.display = "none";

                resetCounters();
                running = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                cameraSwitchBtn.disabled = false;

                if (!isMobile) {
                    cameraSwitchBtn.disabled = true;
                }

                loop();
            } catch (err) {
                console.error(err);
                deviceBadge.textContent = "카메라 실패";
                alert("카메라를 열 수 없습니다. 브라우저 권한과 HTTPS 환경을 확인하세요.");
            }
        }

        function stop() {
            running = false;

            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = 0;
            }

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            video.srcObject = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            placeholderGuide.style.display = "flex";

            startBtn.disabled = false;
            stopBtn.disabled = true;
            cameraSwitchBtn.disabled = !isMobile;
            updateDeviceBadge();
        }

        async function switchCamera() {
            if (!isMobile) return;

            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            applyMirror();
            updateDeviceBadge();

            if (running) {
                stop();
                await start();
            }
        }

        function loop() {
            if (!running) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const result = faceLandmarker.detectForVideo(video, performance.now());

            if (result.faceLandmarks.length > 0) {
                const lm = result.faceLandmarks[0];

                drawingUtils.drawConnectors(
                    lm,
                    FaceLandmarker.FACE_LANDMARKS_TESSELATION,
                    { color: "#00FFAA", lineWidth: 1 }
                );

                if (lm.length > 477) {
                    const leftIris = lm[468];
                    const leftOuter = lm[33];
                    const leftInner = lm[133];
                    const top = lm[159];
                    const bottom = lm[145];

                    let gazeX = (leftIris.x - leftOuter.x) / (leftInner.x - leftOuter.x);
                    gazeX = (gazeX - 0.5) * 2;

                    let gazeY = (leftIris.y - top.y) / (bottom.y - top.y);
                    gazeY = (gazeY - 0.5) * -2;

                    gazeX = clamp(gazeX, -1, 1);
                    gazeY = clamp(gazeY, -1, 1);

                    gazeXEl.innerText = gazeX.toFixed(2);
                    gazeYEl.innerText = gazeY.toFixed(2);

                    if (prevGazeX !== null && prevGazeY !== null) {
                        const dx = gazeX - prevGazeX;
                        const dy = gazeY - prevGazeY;
                        const move = Math.sqrt(dx * dx + dy * dy);
                        if (move > 0.08) {
                            eyeMoveCount++;
                            eyeMoveCountEl.innerText = String(eyeMoveCount);
                        }
                    }

                    prevGazeX = gazeX;
                    prevGazeY = gazeY;
                }

                const earLeft = calcEAR(lm, true);
                const earRight = calcEAR(lm, false);
                const ear = (earLeft + earRight) * 0.5;

                if (ear < 0.17 && !eyeClosed) {
                    eyeClosed = true;
                }
                if (ear > 0.23 && eyeClosed) {
                    blinkCount++;
                    eyeClosed = false;
                    blinkCountEl.innerText = String(blinkCount);
                }

                if (result.facialTransformationMatrixes.length > 0) {
                    const m = result.facialTransformationMatrixes[0].data;
                    const yaw = Math.atan2(m[8], m[0]);
                    const pitch = Math.asin(-m[9]);
                    yawEl.innerText = (yaw * 57.3).toFixed(1);
                    pitchEl.innerText = (pitch * 57.3).toFixed(1);
                }

                if (result.faceBlendshapes.length > 0) {
                    const bs = result.faceBlendshapes[0].categories;
                    const get = (name) => {
                        const found = bs.find(b => b.categoryName === name);
                        return found ? found.score : 0;
                    };

                    const smile = Math.max(get("mouthSmileLeft"), get("mouthSmileRight"));
                    const jaw = get("jawOpen");

                    smileEl.innerText = smile.toFixed(2);
                    jawEl.innerText = jaw.toFixed(2);
                }
            }

            rafId = requestAnimationFrame(loop);
        }

        isMobile = detectMobile();
        currentFacingMode = isMobile ? "user" : "user";
        updateDeviceBadge();
        applyMirror();
        cameraSwitchBtn.disabled = !isMobile;

        cameraSwitchBtn.addEventListener("click", switchCamera);
        startBtn.addEventListener("click", start);
        stopBtn.addEventListener("click", stop);
    </script>
</body>
</html>
