<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>capture.html</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background: #0f1115;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            background: #0f1115;
        }

        .app {
            width: 100%;
            max-width: 430px;
            min-height: 100dvh;
            background: #11151c;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 18px 16px 14px;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.2px;
        }

        .camera-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4.4;
            background: #000;
            overflow: hidden;
        }

        video,
        #capturedImage {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            transform: scaleX(-1);
        }

        #capturedImage {
            transform: none;
        }

        .face-guide {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 62%;
            height: 66%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.45);
            border-radius: 46% 46% 43% 43% / 38% 38% 48% 48%;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.16), inset 0 0 0 1px rgba(255,255,255,0.2);
            pointer-events: none;
            z-index: 10;
        }

        .info-badge {
            position: absolute;
            right: 12px;
            top: 70px;
            z-index: 22;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(0,0,0,0.45);
            font-size: 12px;
            line-height: 1.45;
            color: #e7edf7;
            white-space: pre-line;
            backdrop-filter: blur(8px);
            max-width: 62%;
        }

        .bottom-panel {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .status {
            min-height: 46px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 14px;
            line-height: 1.5;
            color: rgba(255,255,255,0.92);
            white-space: pre-line;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            min-width: 120px;
            transition: transform 0.08s ease, opacity 0.2s ease;
        }

            button:active {
                transform: scale(0.98);
            }

        .primary {
            background: #4c8dff;
            color: #fff;
        }

        .danger {
            background: #ff5d5d;
            color: #fff;
        }

        .secondary {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .save {
            background: #17b26a;
            color: #fff;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">얼굴 촬영</div>

        <div class="camera-wrap">
            <video id="video" playsinline autoplay muted></video>
            <img id="capturedImage" class="hidden" alt="captured result" />
            <div id="faceGuide" class="face-guide"></div>
            <div id="infoBadge" class="info-badge">카메라 준비중.</div>
        </div>

        <div class="bottom-panel">
            <div id="status" class="status">고해상도 카메라와 MediaPipe를 준비합니다.</div>

            <div class="btn-row">
                <button id="startBtn" class="primary">Start</button>
                <button id="stopBtn" class="danger hidden">Stop</button>

                <button id="retakeBtn" class="secondary hidden">다시 촬영</button>
                <button id="saveBtn" class="save hidden">파일 저장</button>
                <button id="analyzeBtn" class="primary hidden">표정분석보기</button>
            </div>
        </div>

        <canvas id="sourceCanvas"></canvas>
        <canvas id="workCanvas"></canvas>
    </div>

    <script type="module">
        import {
            FaceLandmarker,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

        const TARGET_W = 2208;
        const TARGET_H = 3306;

        const TARGET_EYE_TO_CHIN = 870;
        const TARGET_EYE_INNER_Y = 1400;
        const TARGET_EYE_CENTER_X = 1104;

        const MODEL_ASSET_PATH =
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task";

        const DB_NAME = "CaptureImageDB";
        const STORE_NAME = "images";
        const IMAGE_KEY = "capturedImage";
        const META_KEY = "capturedMeta";

        const IDX_LEFT_EYE_OUTER = 33;
        const IDX_LEFT_EYE_INNER = 133;
        const IDX_RIGHT_EYE_INNER = 362;
        const IDX_RIGHT_EYE_OUTER = 263;
        const IDX_CHIN = 152;

        const video = document.getElementById("video");
        const capturedImage = document.getElementById("capturedImage");
        const faceGuide = document.getElementById("faceGuide");
        const infoBadge = document.getElementById("infoBadge");
        const statusEl = document.getElementById("status");

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const retakeBtn = document.getElementById("retakeBtn");
        const saveBtn = document.getElementById("saveBtn");
        const analyzeBtn = document.getElementById("analyzeBtn");

        const sourceCanvas = document.getElementById("sourceCanvas");
        const workCanvas = document.getElementById("workCanvas");

        let stream = null;
        let imageCapture = null;
        let faceLandmarker = null;
        let mpLoadingPromise = null;
        let currentPreviewUrl = null;
        let lastSavedBlob = null;
        let lastSavedMeta = null;

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function setInfo(msg) {
            infoBadge.textContent = msg;
        }

        function revokePreviewUrl() {
            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
                currentPreviewUrl = null;
            }
        }

        function isMobile() {
            return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        }

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);

                request.onupgradeneeded = function (event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };

                request.onsuccess = function () {
                    resolve(request.result);
                };

                request.onerror = function () {
                    reject(request.error || new Error("IndexedDB open failed"));
                };
            });
        }

        async function saveBlobToDB(blob) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                const req = store.put(blob, IMAGE_KEY);

                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error || new Error("IndexedDB image save failed"));
            });
        }

        async function saveMetaToDB(meta) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                const req = store.put(meta, META_KEY);

                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error || new Error("IndexedDB meta save failed"));
            });
        }

        async function getBlobFromDB() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(IMAGE_KEY);

                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => reject(req.error || new Error("IndexedDB image read failed"));
            });
        }

        function stopTracks() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            stream = null;
            imageCapture = null;
            video.srcObject = null;
        }

        function getRequestedConstraints() {
            if (isMobile()) {
                return {
                    audio: false,
                    video: {
                        facingMode: { ideal: "user" },
                        width: { ideal: 4096 },
                        height: { ideal: 3072 }
                    }
                };
            }

            return {
                audio: false,
                video: {
                    facingMode: { ideal: "user" },
                    width: { ideal: 2560 },
                    height: { ideal: 1440 }
                }
            };
        }

        async function ensureFaceLandmarker() {
            if (faceLandmarker) return faceLandmarker;
            if (mpLoadingPromise) return mpLoadingPromise;

            mpLoadingPromise = (async () => {
                setStatus("MediaPipe Face Landmarker 로딩중.");
                setInfo("MediaPipe 준비중.");

                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );

                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: MODEL_ASSET_PATH
                    },
                    runningMode: "IMAGE",
                    numFaces: 1,
                    outputFaceBlendshapes: false,
                    outputFacialTransformationMatrixes: false,
                    minFaceDetectionConfidence: 0.5,
                    minFacePresenceConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });

                setStatus("MediaPipe 준비 완료\n촬영할 수 있습니다.");
                setInfo("MediaPipe 준비 완료");
                return faceLandmarker;
            })();

            return mpLoadingPromise;
        }

        async function startCamera() {
            stopTracks();

            try {
                const constraints = getRequestedConstraints();
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();

                const track = stream.getVideoTracks()[0];
                try {
                    imageCapture = new ImageCapture(track);
                } catch (e) {
                    imageCapture = null;
                }

                startBtn.classList.add("hidden");
                stopBtn.classList.remove("hidden");
                retakeBtn.classList.add("hidden");
                saveBtn.classList.add("hidden");
                analyzeBtn.classList.add("hidden");

                capturedImage.classList.add("hidden");
                video.classList.remove("hidden");
                faceGuide.classList.remove("hidden");

                revokePreviewUrl();

                const settings = track.getSettings ? track.getSettings() : {};
                setStatus("카메라 준비 완료\n정면으로 얼굴을 맞춘 뒤 Stop을 누르세요.");
                setInfo(
                    `video ${settings.width || "-"} x ${settings.height || "-"}\n` +
                    `모바일: ${isMobile() ? "Y" : "N"}`
                );

                ensureFaceLandmarker().catch(console.error);
            } catch (err) {
                console.error(err);
                setStatus("카메라를 시작할 수 없습니다.\n브라우저 권한과 HTTPS/localhost 여부를 확인하세요.");
                setInfo("카메라 실패");
            }
        }

        async function getHighResSourceBitmap() {
            if (!stream) {
                throw new Error("No active camera stream");
            }

            if (imageCapture) {
                try {
                    const photoBlob = await imageCapture.takePhoto();
                    const bitmap = await createImageBitmap(photoBlob);
                    return {
                        bitmap,
                        sourceType: "photo",
                        rawWidth: bitmap.width,
                        rawHeight: bitmap.height
                    };
                } catch (e) {
                    console.warn("takePhoto failed, fallback to video frame", e);
                }
            }

            const bitmap = await createImageBitmap(video);
            return {
                bitmap,
                sourceType: "video",
                rawWidth: bitmap.width,
                rawHeight: bitmap.height
            };
        }

        function drawMirroredBitmapToCanvas(bitmap, canvas) {
            const ctx = canvas.getContext("2d", { alpha: false });
            canvas.width = bitmap.width;
            canvas.height = bitmap.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        function getLandmarkPx(landmarks, index, width, height) {
            const lm = landmarks[index];
            return {
                x: lm.x * width,
                y: lm.y * height,
                z: lm.z ?? 0
            };
        }

        function computeFacePlacement(landmarks, width, height) {
            const leftEyeOuter = getLandmarkPx(landmarks, IDX_LEFT_EYE_OUTER, width, height);
            const leftEyeInner = getLandmarkPx(landmarks, IDX_LEFT_EYE_INNER, width, height);
            const rightEyeInner = getLandmarkPx(landmarks, IDX_RIGHT_EYE_INNER, width, height);
            const rightEyeOuter = getLandmarkPx(landmarks, IDX_RIGHT_EYE_OUTER, width, height);
            const chin = getLandmarkPx(landmarks, IDX_CHIN, width, height);

            const eyeInnerY = (leftEyeInner.y + rightEyeInner.y) * 0.5;

            const leftEyeCenterX = (leftEyeOuter.x + leftEyeInner.x) * 0.5;
            const rightEyeCenterX = (rightEyeOuter.x + rightEyeInner.x) * 0.5;
            const eyeCenterX = (leftEyeCenterX + rightEyeCenterX) * 0.5;

            const eyeToChin = chin.y - eyeInnerY;

            if (!Number.isFinite(eyeToChin) || eyeToChin <= 1) {
                throw new Error("Invalid eye-to-chin distance");
            }

            const scale = TARGET_EYE_TO_CHIN / eyeToChin;
            const drawX = TARGET_EYE_CENTER_X - (eyeCenterX * scale);
            const drawY = TARGET_EYE_INNER_Y - (eyeInnerY * scale);

            return {
                scale,
                drawX,
                drawY,
                eyeToChin,
                eyeInnerY,
                eyeCenterX
            };
        }

        async function canvasToBlob(canvas, quality = 0.96) {
            return new Promise((resolve, reject) => {
                canvas.toBlob(
                    (b) => {
                        if (b) resolve(b);
                        else reject(new Error("canvas.toBlob failed"));
                    },
                    "image/jpeg",
                    quality
                );
            });
        }

        async function detectLandmarksOnCanvas(canvas) {
            await ensureFaceLandmarker();

            const result = faceLandmarker.detect(canvas);

            if (!result || !result.faceLandmarks || result.faceLandmarks.length === 0) {
                throw new Error("얼굴이 감지되지 않았습니다.");
            }

            return result.faceLandmarks[0];
        }

        function transformPointToTarget(pt, placement) {
            return {
                x: pt.x * placement.scale + placement.drawX,
                y: pt.y * placement.scale + placement.drawY,
                z: pt.z * placement.scale
            };
        }

        function buildAllLandmarksMeta(landmarks, width, height, placement) {
            const transformed = [];

            for (let i = 0; i < landmarks.length; i++) {
                const src = getLandmarkPx(landmarks, i, width, height);
                const dst = transformPointToTarget(src, placement);

                transformed.push({
                    index: i,
                    x: Number(dst.x.toFixed(4)),
                    y: Number(dst.y.toFixed(4)),
                    z: Number(dst.z.toFixed(4))
                });
            }

            return transformed;
        }

        async function renderAlignedTargetBlob() {
            const { bitmap, sourceType, rawWidth, rawHeight } = await getHighResSourceBitmap();

            drawMirroredBitmapToCanvas(bitmap, sourceCanvas);
            bitmap.close();

            const landmarks = await detectLandmarksOnCanvas(sourceCanvas);

            const placement = computeFacePlacement(
                landmarks,
                sourceCanvas.width,
                sourceCanvas.height
            );

            const transformedLandmarks = buildAllLandmarksMeta(
                landmarks,
                sourceCanvas.width,
                sourceCanvas.height,
                placement
            );

            const canvas = workCanvas;
            const ctx = canvas.getContext("2d", { alpha: false });
            canvas.width = TARGET_W;
            canvas.height = TARGET_H;

            ctx.clearRect(0, 0, TARGET_W, TARGET_H);
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, TARGET_W, TARGET_H);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";

            const drawW = sourceCanvas.width * placement.scale;
            const drawH = sourceCanvas.height * placement.scale;

            ctx.drawImage(
                sourceCanvas,
                placement.drawX,
                placement.drawY,
                drawW,
                drawH
            );

            const blob = await canvasToBlob(canvas);

            return {
                blob,
                meta: {
                    finalWidth: TARGET_W,
                    finalHeight: TARGET_H,
                    landmarkCount: transformedLandmarks.length,
                    landmarks: transformedLandmarks,
                    placement: {
                        scale: Number(placement.scale.toFixed(8)),
                        drawX: Number(placement.drawX.toFixed(4)),
                        drawY: Number(placement.drawY.toFixed(4)),
                        eyeToChin: Number(placement.eyeToChin.toFixed(4)),
                        eyeInnerY: Number(placement.eyeInnerY.toFixed(4)),
                        eyeCenterX: Number(placement.eyeCenterX.toFixed(4))
                    },
                    source: {
                        width: sourceCanvas.width,
                        height: sourceCanvas.height,
                        mirrored: true
                    },
                    createdAt: new Date().toISOString()
                },
                sourceType,
                rawWidth,
                rawHeight,
                finalWidth: TARGET_W,
                finalHeight: TARGET_H,
                scale: placement.scale,
                eyeToChinBefore: placement.eyeToChin
            };
        }

        async function capturePhoto() {
            try {
                setStatus("촬영 후 얼굴 기준 정렬 중.");
                setInfo("MediaPipe 분석중.");

                const result = await renderAlignedTargetBlob();
                lastSavedBlob = result.blob;
                lastSavedMeta = result.meta;

                await saveBlobToDB(result.blob);
                await saveMetaToDB(result.meta);

                revokePreviewUrl();
                currentPreviewUrl = URL.createObjectURL(result.blob);
                capturedImage.src = currentPreviewUrl;

                stopTracks();

                video.classList.add("hidden");
                capturedImage.classList.remove("hidden");
                faceGuide.classList.add("hidden");

                startBtn.classList.add("hidden");
                stopBtn.classList.add("hidden");

                retakeBtn.classList.remove("hidden");
                saveBtn.classList.remove("hidden");
                analyzeBtn.classList.remove("hidden");

                const lm0 = result.meta.landmarks[0];
                const lm61 = result.meta.landmarks[61];
                const lm291 = result.meta.landmarks[291];

                setStatus(
                    `정렬 완료\n` +
                    `${result.rawWidth} x ${result.rawHeight} (${result.sourceType}) → ${result.finalWidth} x ${result.finalHeight}\n` +
                    `랜드마크 ${result.meta.landmarkCount}개 저장 완료`
                );

                setInfo(
                    `final ${result.finalWidth} x ${result.finalHeight}\n` +
                    `landmarks: ${result.meta.landmarkCount}\n` +
                    `0: (${lm0.x.toFixed(1)}, ${lm0.y.toFixed(1)})\n` +
                    `61: (${lm61.x.toFixed(1)}, ${lm61.y.toFixed(1)})\n` +
                    `291: (${lm291.x.toFixed(1)}, ${lm291.y.toFixed(1)})`
                );
            } catch (err) {
                console.error(err);
                setStatus("촬영 또는 얼굴 정렬에 실패했습니다.\n얼굴이 정면에 잘 보이게 다시 촬영하세요.");
                setInfo("정렬 실패");
            }
        }

        async function saveToFile() {
            try {
                let blob = lastSavedBlob;
                if (!blob) {
                    blob = await getBlobFromDB();
                }

                if (!blob) {
                    setStatus("저장된 결과 이미지가 없습니다.");
                    return;
                }

                const a = document.createElement("a");
                const url = URL.createObjectURL(blob);
                a.href = url;
                a.download = "captured_2208x3306.jpg";
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 1000);

                setStatus("파일 저장을 시작했습니다.");
            } catch (err) {
                console.error(err);
                setStatus("파일 저장에 실패했습니다.");
            }
        }

        function resetToCameraMode() {
            revokePreviewUrl();
            capturedImage.removeAttribute("src");
            capturedImage.classList.add("hidden");
            video.classList.remove("hidden");
            faceGuide.classList.remove("hidden");

            startBtn.classList.remove("hidden");
            stopBtn.classList.add("hidden");
            retakeBtn.classList.add("hidden");
            saveBtn.classList.add("hidden");
            analyzeBtn.classList.add("hidden");

            lastSavedBlob = null;
            lastSavedMeta = null;

            setStatus("카메라를 다시 시작합니다.");
            setInfo("재촬영 준비중.");
            startCamera();
        }

        function goToAnalysis() {
            location.href = "analysis.html";
        }

        startBtn.addEventListener("click", async () => {
            await startCamera();
        });

        stopBtn.addEventListener("click", async () => {
            await capturePhoto();
        });

        retakeBtn.addEventListener("click", () => {
            resetToCameraMode();
        });

        saveBtn.addEventListener("click", async () => {
            await saveToFile();
        });

        analyzeBtn.addEventListener("click", () => {
            goToAnalysis();
        });

        window.addEventListener("beforeunload", () => {
            stopTracks();
            revokePreviewUrl();
        });

        (async function init() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus("이 브라우저는 카메라를 지원하지 않습니다.");
                setInfo("camera unsupported");
                return;
            }

            if (location.protocol === "file:") {
                setStatus("file:// 환경에서는 카메라나 MediaPipe가 정상 동작하지 않을 수 있습니다.\nlocalhost 또는 https:// 로 실행하세요.");
                setInfo("file:// 실행중");
            } else {
                setStatus("고해상도 카메라와 MediaPipe를 준비합니다.");
                setInfo("초기화중.");
            }

            await startCamera();
        })();
    </script>
</body>
</html>
