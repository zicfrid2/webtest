<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capture</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #0f1115;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            position: relative;
            width: min(100vw, 430px);
            height: 100vh;
            background: #11151c;
            overflow: hidden;
        }

        .topbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            z-index: 20;
            font-size: 18px;
            font-weight: 700;
            backdrop-filter: blur(8px);
        }

        .camera-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video,
        img#capturedImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        /* 보이는 화면은 항상 좌우반전 */
        video {
            transform: scaleX(-1);
        }

        img#capturedImage {
            transform: scaleX(-1);
        }

        .face-guide {
            position: absolute;
            width: 68%;
            aspect-ratio: 3 / 4;
            border: 2px dashed rgba(255,255,255,0.28);
            border-radius: 48% 48% 42% 42% / 38% 38% 56% 56%;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.28);
            opacity: 0.8;
        }

        .bottom-panel {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            padding: 18px 16px 22px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.2), rgba(0,0,0,0));
            z-index: 30;
        }

        .status {
            min-height: 22px;
            margin-bottom: 12px;
            text-align: center;
            font-size: 13px;
            color: #d0d7e2;
            opacity: 0.95;
            white-space: pre-line;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            appearance: none;
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            min-width: 120px;
            transition: transform 0.08s ease, opacity 0.2s ease;
        }

            button:active {
                transform: scale(0.98);
            }

        .primary {
            background: #4c8dff;
            color: #fff;
        }

        .danger {
            background: #ff5d5d;
            color: #fff;
        }

        .secondary {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .save {
            background: #17b26a;
            color: #fff;
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }

        .info-badge {
            position: absolute;
            right: 12px;
            top: 70px;
            z-index: 22;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(0,0,0,0.45);
            font-size: 12px;
            line-height: 1.4;
            color: #e7edf7;
            white-space: pre-line;
            backdrop-filter: blur(8px);
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">얼굴 촬영</div>

        <div class="camera-wrap">
            <video id="video" playsinline autoplay muted></video>
            <img id="capturedImage" class="hidden" alt="captured result" />
            <div id="faceGuide" class="face-guide"></div>
        </div>

        <div id="infoBadge" class="info-badge">카메라 준비중...</div>

        <div class="bottom-panel">
            <div id="status" class="status">고해상도 카메라를 요청합니다.</div>

            <div class="btn-row">
                <button id="startBtn" class="primary">Start</button>
                <button id="stopBtn" class="danger hidden">Stop</button>

                <button id="retakeBtn" class="secondary hidden">다시 촬영</button>
                <button id="saveBtn" class="save hidden">파일 저장</button>
                <button id="analyzeBtn" class="primary hidden">표정분석보기</button>
            </div>
        </div>

        <canvas id="workCanvas"></canvas>
    </div>

    <script>
        const MIN_KEEP_W = 2208;
        const MIN_KEEP_H = 3076;

        const UPSCALE_TARGET_W = 2208;
        const UPSCALE_TARGET_H = 3306;

        const DB_NAME = "CaptureImageDB";
        const STORE_NAME = "images";
        const IMAGE_KEY = "capturedImage";

        const video = document.getElementById("video");
        const capturedImage = document.getElementById("capturedImage");
        const workCanvas = document.getElementById("workCanvas");

        const statusEl = document.getElementById("status");
        const infoBadge = document.getElementById("infoBadge");
        const faceGuide = document.getElementById("faceGuide");

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const retakeBtn = document.getElementById("retakeBtn");
        const saveBtn = document.getElementById("saveBtn");
        const analyzeBtn = document.getElementById("analyzeBtn");

        let stream = null;
        let imageCapture = null;
        let currentPreviewUrl = null;
        let lastSavedBlob = null;

        function isMobile() {
            return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        }

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function setInfo(msg) {
            infoBadge.textContent = msg;
        }

        function revokePreviewUrl() {
            if (currentPreviewUrl) {
                URL.revokeObjectURL(currentPreviewUrl);
                currentPreviewUrl = null;
            }
        }

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);

                request.onupgradeneeded = function (event) {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };

                request.onsuccess = function () {
                    resolve(request.result);
                };

                request.onerror = function () {
                    reject(request.error || new Error("IndexedDB open failed"));
                };
            });
        }

        async function saveBlobToDB(blob) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                const store = tx.objectStore(STORE_NAME);
                const req = store.put(blob, IMAGE_KEY);

                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error || new Error("IndexedDB save failed"));
            });
        }

        async function getBlobFromDB() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const req = store.get(IMAGE_KEY);

                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => reject(req.error || new Error("IndexedDB read failed"));
            });
        }

        function stopTracks() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            stream = null;
            imageCapture = null;
            video.srcObject = null;
        }

        function getRequestedConstraints() {
            if (isMobile()) {
                return {
                    audio: false,
                    video: {
                        facingMode: { ideal: "user" },
                        width: { ideal: 4096 },
                        height: { ideal: 3072 }
                    }
                };
            }

            return {
                audio: false,
                video: {
                    facingMode: { ideal: "user" },
                    width: { ideal: 2560 },
                    height: { ideal: 1440 }
                }
            };
        }

        async function startCamera() {
            try {
                setStatus("카메라를 시작하는 중...");
                setInfo("카메라 연결중...");
                revokePreviewUrl();
                stopTracks();
                lastSavedBlob = null;

                const constraints = getRequestedConstraints();
                stream = await navigator.mediaDevices.getUserMedia(constraints);

                video.srcObject = stream;
                await video.play();

                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings ? track.getSettings() : {};
                const capabilities = track.getCapabilities ? track.getCapabilities() : null;

                if (window.ImageCapture) {
                    try {
                        imageCapture = new ImageCapture(track);
                    } catch (e) {
                        imageCapture = null;
                    }
                } else {
                    imageCapture = null;
                }

                const previewW = video.videoWidth || settings.width || 0;
                const previewH = video.videoHeight || settings.height || 0;

                let capText = `미리보기 ${previewW} x ${previewH}`;
                if (settings.width && settings.height) {
                    capText += `\ntrack ${settings.width} x ${settings.height}`;
                }
                if (capabilities && capabilities.width && capabilities.height) {
                    capText += `\nmax ${capabilities.width.max || "-"} x ${capabilities.height.max || "-"}`;
                }
                setInfo(capText);

                setStatus(
                    imageCapture
                        ? "고해상도 촬영 준비 완료\nStop을 누르면 촬영 후 화면에 표시합니다."
                        : "ImageCapture 미지원 환경입니다.\n현재 비디오 프레임으로 촬영합니다."
                );

                video.classList.remove("hidden");
                capturedImage.classList.add("hidden");
                faceGuide.classList.remove("hidden");

                startBtn.classList.add("hidden");
                stopBtn.classList.remove("hidden");

                retakeBtn.classList.add("hidden");
                saveBtn.classList.add("hidden");
                analyzeBtn.classList.add("hidden");
            } catch (err) {
                console.error(err);
                setStatus("카메라를 열 수 없습니다.\n브라우저 권한과 HTTPS 환경을 확인하세요.");
                setInfo("카메라 실패");
            }
        }

        async function getHighResSourceBitmap() {
            if (!stream) {
                throw new Error("No active camera stream");
            }

            const track = stream.getVideoTracks()[0];

            if (imageCapture) {
                try {
                    const photoBlob = await imageCapture.takePhoto();
                    const bitmap = await createImageBitmap(photoBlob);
                    return {
                        bitmap,
                        sourceType: "photo",
                        rawWidth: bitmap.width,
                        rawHeight: bitmap.height
                    };
                } catch (e) {
                    console.warn("takePhoto failed, fallback to video frame", e);
                }
            }

            const bitmap = await createImageBitmap(video);
            return {
                bitmap,
                sourceType: "video",
                rawWidth: bitmap.width,
                rawHeight: bitmap.height
            };
        }

        async function canvasToBlob(canvas, quality = 0.96) {
            return new Promise((resolve, reject) => {
                canvas.toBlob(
                    (b) => {
                        if (b) resolve(b);
                        else reject(new Error("canvas.toBlob failed"));
                    },
                    "image/jpeg",
                    quality
                );
            });
        }

        async function renderToTargetBlob() {
            const { bitmap, sourceType, rawWidth, rawHeight } = await getHighResSourceBitmap();

            const canvas = workCanvas;
            const ctx = canvas.getContext("2d", { alpha: false });

            const keepOriginal = rawWidth >= MIN_KEEP_W && rawHeight >= MIN_KEEP_H;

            if (keepOriginal) {
                canvas.width = rawWidth;
                canvas.height = rawHeight;
                ctx.clearRect(0, 0, rawWidth, rawHeight);

                /*
                  화면이 좌우반전으로 보이므로
                  저장 파일도 화면과 동일하게 좌우반전 저장
                */
                ctx.save();
                ctx.translate(rawWidth, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(bitmap, 0, 0, rawWidth, rawHeight);
                ctx.restore();

                bitmap.close();

                const blob = await canvasToBlob(canvas);

                return {
                    blob,
                    sourceType,
                    rawWidth,
                    rawHeight,
                    finalWidth: rawWidth,
                    finalHeight: rawHeight,
                    isOriginal: true
                };
            }

            canvas.width = UPSCALE_TARGET_W;
            canvas.height = UPSCALE_TARGET_H;
            ctx.clearRect(0, 0, UPSCALE_TARGET_W, UPSCALE_TARGET_H);

            const scale = UPSCALE_TARGET_W / rawWidth;
            const scaledH = rawHeight * scale;
            const dy = (UPSCALE_TARGET_H - scaledH) * 0.5;

            ctx.save();
            ctx.translate(UPSCALE_TARGET_W, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(bitmap, 0, dy, UPSCALE_TARGET_W, scaledH);
            ctx.restore();

            bitmap.close();

            const blob = await canvasToBlob(canvas);

            return {
                blob,
                sourceType,
                rawWidth,
                rawHeight,
                finalWidth: UPSCALE_TARGET_W,
                finalHeight: UPSCALE_TARGET_H,
                isOriginal: false
            };
        }

        async function capturePhoto() {
            try {
                setStatus("고해상도 사진을 생성하는 중...");
                setInfo("촬영중...");

                const result = await renderToTargetBlob();
                lastSavedBlob = result.blob;

                await saveBlobToDB(result.blob);

                revokePreviewUrl();
                currentPreviewUrl = URL.createObjectURL(result.blob);
                capturedImage.src = currentPreviewUrl;

                stopTracks();

                video.classList.add("hidden");
                capturedImage.classList.remove("hidden");
                faceGuide.classList.add("hidden");

                startBtn.classList.add("hidden");
                stopBtn.classList.add("hidden");

                retakeBtn.classList.remove("hidden");
                saveBtn.classList.remove("hidden");
                analyzeBtn.classList.remove("hidden");

                if (result.isOriginal) {
                    setStatus(
                        `원본 그대로 저장됨\n${result.rawWidth} x ${result.rawHeight} (${result.sourceType})`
                    );
                    setInfo(`원본 유지\n${result.finalWidth} x ${result.finalHeight}`);
                } else {
                    setStatus(
                        `리사이즈 적용\n${result.rawWidth} x ${result.rawHeight} (${result.sourceType}) → ${result.finalWidth} x ${result.finalHeight}`
                    );
                    setInfo(`리사이즈됨\n${result.finalWidth} x ${result.finalHeight}`);
                }
            } catch (err) {
                console.error(err);
                setStatus("이미지 저장에 실패했습니다.");
                setInfo("저장 실패");
            }
        }

        async function retakePhoto() {
            revokePreviewUrl();
            capturedImage.removeAttribute("src");
            await startCamera();
        }

        async function downloadCapturedFile() {
            try {
                let blob = lastSavedBlob;
                if (!blob) {
                    blob = await getBlobFromDB();
                }

                if (!blob) {
                    setStatus("저장된 이미지가 없습니다.");
                    return;
                }

                const url = URL.createObjectURL(blob);
                const now = new Date();

                const pad = (n) => String(n).padStart(2, "0");
                const fileName =
                    `capture_${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_` +
                    `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.jpg`;

                const a = document.createElement("a");
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                a.remove();

                setTimeout(() => URL.revokeObjectURL(url), 1000);
                setStatus(`파일 저장 완료\n${fileName}`);
            } catch (err) {
                console.error(err);
                setStatus("파일 저장에 실패했습니다.");
            }
        }

        async function goAnalyze() {
            try {
                const blob = await getBlobFromDB();
                if (!blob) {
                    setStatus("저장된 이미지가 없습니다.");
                    return;
                }

                /*
                  analysis.html 에서는 이 Blob을 그대로 읽어서 써야 함.
                  여기서는 추가 리사이즈 없이 그대로 전달.
                */
                window.location.href = "analysis.html";
            } catch (err) {
                console.error(err);
                setStatus("저장된 이미지를 불러오지 못했습니다.");
            }
        }

        startBtn.addEventListener("click", startCamera);
        stopBtn.addEventListener("click", capturePhoto);
        retakeBtn.addEventListener("click", retakePhoto);
        saveBtn.addEventListener("click", downloadCapturedFile);
        analyzeBtn.addEventListener("click", goAnalyze);

        window.addEventListener("beforeunload", () => {
            stopTracks();
            revokePreviewUrl();
        });
    </script>
</body>
</html>
